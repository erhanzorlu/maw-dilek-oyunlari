<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no" />
    <title>Dilek Gezegeni — Narrative Adventure ✨</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        body {
            font-family: 'Quicksand', sans-serif;
            background: linear-gradient(160deg, #1a1a2e, #16213e);
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-user-select: none;
            user-select: none
        }

        #game {
            position: relative;
            width: min(100vw, 800px);
            height: min(100vh, 600px);
            background: linear-gradient(180deg, #1a1a2e, #16213e 40%, #0f3460);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 0 60px rgba(95, 39, 205, .3)
        }

        /* Stars BG */
        #game::before {
            content: '';
            position: absolute;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            background: radial-gradient(1px 1px at 10% 20%, #fff8, transparent), radial-gradient(1px 1px at 30% 50%, #fff6, transparent), radial-gradient(1.5px 1.5px at 50% 10%, #fff9, transparent), radial-gradient(1px 1px at 70% 60%, #fff5, transparent), radial-gradient(1px 1px at 90% 30%, #fff7, transparent), radial-gradient(1.5px 1.5px at 15% 80%, #fff6, transparent), radial-gradient(1px 1px at 45% 70%, #fff8, transparent), radial-gradient(1px 1px at 75% 85%, #fff5, transparent), radial-gradient(1.5px 1.5px at 85% 15%, #fff7, transparent), radial-gradient(1px 1px at 25% 40%, #fff6, transparent);
            animation: twinkle 4s ease-in-out infinite alternate
        }

        @keyframes twinkle {
            0% {
                opacity: .4
            }

            100% {
                opacity: 1
            }
        }

        /* Scene system */
        .scene {
            position: absolute;
            inset: 0;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px;
            text-align: center;
            opacity: 0;
            transition: opacity .8s ease;
            z-index: 1
        }

        .scene.active {
            display: flex;
            opacity: 1
        }

        /* Transition overlay */
        #transition-overlay {
            position: absolute;
            inset: 0;
            z-index: 100;
            pointer-events: none;
            display: none
        }

        /* Fairy canvas */
        #fairy-canvas {
            width: 120px;
            height: 120px;
            margin-bottom: 4px;
            z-index: 2
        }

        /* Bubble */
        .bubble {
            background: rgba(255, 255, 255, .1);
            backdrop-filter: blur(14px);
            border: 1px solid rgba(255, 255, 255, .15);
            border-radius: 22px;
            padding: 20px 26px;
            max-width: 520px;
            width: 92%;
            margin-top: 10px;
            opacity: 0;
            transform: translateY(16px);
            transition: opacity .6s ease .2s, transform .6s ease .2s
        }

        .bubble.vis {
            opacity: 1;
            transform: translateY(0)
        }

        .bubble p {
            font-size: clamp(14px, 2.8vw, 18px);
            color: #e8e0f0;
            line-height: 1.7
        }

        .choices {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            margin-top: 14px;
            opacity: 0;
            transform: translateY(10px);
            transition: opacity .5s ease .3s, transform .5s ease .3s
        }

        .choices.vis {
            opacity: 1;
            transform: translateY(0)
        }

        .btn {
            padding: 13px 30px;
            font-family: inherit;
            font-weight: 700;
            font-size: 15px;
            border: none;
            border-radius: 28px;
            color: #fff;
            cursor: pointer;
            transition: transform .2s, box-shadow .2s;
            box-shadow: 0 4px 16px rgba(0, 0, 0, .2);
            margin: 4px
        }

        .btn:hover {
            transform: translateY(-2px)
        }

        .btn-p {
            background: linear-gradient(135deg, #ce93d8, #ab47bc)
        }

        .btn-k {
            background: linear-gradient(135deg, #f8bbd0, #f48fb1)
        }

        .btn-b {
            background: linear-gradient(135deg, #90caf9, #64b5f6)
        }

        .btn-g {
            background: linear-gradient(135deg, #a5d6a7, #66bb6a)
        }

        .btn-gold {
            background: linear-gradient(135deg, #ffcc80, #ffa726)
        }

        /* Name input */
        #name-input {
            background: rgba(255, 255, 255, .12);
            border: 2px solid rgba(255, 255, 255, .2);
            border-radius: 16px;
            padding: 14px 20px;
            font-family: inherit;
            font-size: 18px;
            color: #e8e0f0;
            text-align: center;
            width: min(280px, 80%);
            outline: none;
            margin: 12px 0;
            transition: border-color .3s
        }

        #name-input:focus {
            border-color: #ce93d8
        }

        #name-input::placeholder {
            color: rgba(255, 255, 255, .3)
        }

        /* Character selection */
        .char-options {
            display: flex;
            gap: 16px;
            margin: 16px 0
        }

        .char-opt {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: rgba(255, 255, 255, .08);
            border: 3px solid rgba(255, 255, 255, .15);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            cursor: pointer;
            transition: transform .3s, border-color .3s, background .3s
        }

        .char-opt:hover {
            transform: scale(1.1);
            background: rgba(255, 255, 255, .15)
        }

        .char-opt.selected {
            border-color: #ce93d8;
            background: rgba(206, 147, 216, .2);
            transform: scale(1.15)
        }

        /* HUD */
        .hud {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-between;
            padding: 14px 18px;
            z-index: 10
        }

        .hud-pill {
            background: rgba(255, 255, 255, .12);
            backdrop-filter: blur(8px);
            padding: 7px 16px;
            border-radius: 18px;
            font-weight: 700;
            font-size: 13px;
            color: #e0e0e0
        }

        /* Music toggle */
        #music-btn {
            position: absolute;
            top: 14px;
            right: 14px;
            z-index: 50;
            background: rgba(255, 255, 255, .1);
            border: none;
            padding: 8px 14px;
            border-radius: 18px;
            font-size: 18px;
            cursor: pointer;
            color: #e0e0e0;
            transition: transform .2s
        }

        #music-btn:hover {
            transform: scale(1.1)
        }

        /* Map */
        #map-canvas {
            position: absolute;
            inset: 0;
            z-index: 1;
            width: 100%;
            height: 100%
        }

        #map-label {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 5;
            background: rgba(255, 255, 255, .1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, .12);
            padding: 10px 28px;
            border-radius: 20px;
            font-weight: 700;
            font-size: clamp(14px, 2.5vw, 18px);
            color: #e0d0f0;
            opacity: 0;
            transition: opacity .5s
        }

        #map-label.vis {
            opacity: 1
        }

        /* Star minigame */
        #star-field {
            position: absolute;
            inset: 0;
            z-index: 5;
            cursor: pointer
        }

        .star {
            position: absolute;
            font-size: clamp(26px, 5.5vw, 38px);
            cursor: pointer;
            animation: spop .4s ease-out forwards, sglow 1.5s ease-in-out infinite alternate;
            filter: drop-shadow(0 0 8px rgba(255, 241, 118, .7));
            z-index: 6
        }

        .star:hover {
            transform: scale(1.3) !important
        }

        .star.got {
            transform: scale(2) !important;
            opacity: 0 !important;
            transition: transform .3s, opacity .3s;
            pointer-events: none
        }

        @keyframes spop {
            0% {
                transform: scale(0) rotate(-180deg);
                opacity: 0
            }

            100% {
                transform: scale(1) rotate(0);
                opacity: 1
            }
        }

        @keyframes sglow {
            0% {
                filter: drop-shadow(0 0 6px rgba(255, 241, 118, .5))
            }

            100% {
                filter: drop-shadow(0 0 16px rgba(255, 241, 118, .9))
            }
        }

        .prog-wrap {
            position: absolute;
            bottom: 14px;
            left: 50%;
            transform: translateX(-50%);
            width: 65%;
            max-width: 380px;
            height: 9px;
            background: rgba(255, 255, 255, .1);
            border-radius: 8px;
            z-index: 10;
            overflow: hidden
        }

        .prog-bar {
            height: 100%;
            width: 0%;
            border-radius: 8px;
            background: linear-gradient(90deg, #ce93d8, #fff176);
            transition: width .3s
        }

        .countdown {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: clamp(56px, 13vw, 90px);
            color: #fff;
            font-weight: 700;
            text-shadow: 0 0 40px rgba(206, 147, 216, .8);
            pointer-events: none;
            z-index: 20;
            animation: cpop .6s ease-out
        }

        @keyframes cpop {
            0% {
                transform: scale(2);
                opacity: 0
            }

            50% {
                opacity: 1
            }

            100% {
                transform: scale(1)
            }
        }

        /* Cloud painting */
        #cloud-area {
            position: absolute;
            inset: 60px 20px 50px;
            z-index: 5;
            display: flex;
            flex-wrap: wrap;
            align-content: center;
            justify-content: center;
            gap: 18px
        }

        .cloud {
            width: 100px;
            height: 60px;
            background: #555;
            border-radius: 50px;
            cursor: pointer;
            transition: background .5s, transform .3s, box-shadow .5s;
            position: relative;
            opacity: .8
        }

        .cloud::before {
            content: '';
            position: absolute;
            width: 50px;
            height: 40px;
            background: inherit;
            border-radius: 50%;
            top: -15px;
            left: 20px
        }

        .cloud::after {
            content: '';
            position: absolute;
            width: 40px;
            height: 30px;
            background: inherit;
            border-radius: 50%;
            top: -8px;
            right: 15px
        }

        .cloud.painted {
            transform: scale(1.05);
            opacity: 1;
            box-shadow: 0 4px 20px rgba(255, 255, 255, .2)
        }

        /* Music Rhythm minigame */
        #rhythm-area {
            position: absolute;
            inset: 0;
            z-index: 5;
            overflow: hidden
        }

        #catch-zone {
            position: absolute;
            bottom: 60px;
            left: 50%;
            transform: translateX(-50%);
            width: 120px;
            height: 40px;
            border: 3px solid rgba(206, 147, 216, .6);
            border-radius: 12px;
            background: rgba(206, 147, 216, .1);
            z-index: 7;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            color: #ce93d8;
            font-weight: 700
        }

        .note {
            position: absolute;
            font-size: 32px;
            z-index: 6;
            animation: note-fall linear forwards;
            cursor: pointer;
            filter: drop-shadow(0 0 8px rgba(255, 241, 118, .5));
            transition: transform .2s
        }

        .note:hover {
            transform: scale(1.3)
        }

        .note.caught {
            animation: none !important;
            transform: scale(2);
            opacity: 0;
            transition: transform .3s, opacity .3s;
            pointer-events: none
        }

        @keyframes note-fall {
            0% {
                top: -40px
            }

            100% {
                top: calc(100% + 40px)
            }
        }

        /* Spark */
        .spark {
            position: absolute;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            pointer-events: none;
            animation: sdrift .8s ease-out forwards
        }

        @keyframes sdrift {
            0% {
                opacity: 1;
                transform: translate(0, 0) scale(1)
            }

            100% {
                opacity: 0;
                transform: translate(var(--dx), var(--dy)) scale(0)
            }
        }

        /* Confetti */
        #confetti-cv {
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 0
        }
    </style>
</head>

<body>
    <div id="game">

        <!-- Transition overlay -->
        <div id="transition-overlay"><canvas id="trans-cv"></canvas></div>

        <!-- Music toggle -->
        <button id="music-btn" title="Müzik">🎵</button>

        <!-- WAKE + NAME + CHARACTER -->
        <div class="scene active" id="scene-intro">
            <p style="font-size:clamp(22px,5vw,34px);color:#ccc;animation:twinkle 3s ease-in-out infinite"
                id="intro-title">Gözlerini açıyorsun...</p>
            <p style="font-size:13px;color:#7e7ea0;margin-top:12px" id="intro-sub">Adını yaz ve karakterini seç</p>
            <input type="text" id="name-input" placeholder="Adın ne? ✨" maxlength="20" style="display:none" />
            <div class="char-options" id="char-options" style="display:none">
                <div class="char-opt" data-char="explorer" title="Kaşif">🧭</div>
                <div class="char-opt" data-char="astronaut" title="Astronot">👨‍🚀</div>
                <div class="char-opt" data-char="princess" title="Prenses">👸</div>
            </div>
            <button class="btn btn-p" id="intro-start-btn" style="display:none;margin-top:8px">Maceraya Başla!
                🚀</button>
        </div>

        <!-- DIALOGUE -->
        <div class="scene" id="scene-dialogue">
            <canvas id="fairy-canvas" width="120" height="120"></canvas>
            <div class="bubble" id="dia-bubble">
                <p id="dia-text"></p>
            </div>
            <div class="choices" id="dia-choices"></div>
        </div>

        <!-- MAP -->
        <div class="scene" id="scene-map">
            <canvas id="map-canvas"></canvas>
            <div id="map-label"></div>
        </div>

        <!-- STAR MINIGAME -->
        <div class="scene" id="scene-stars">
            <div class="hud"><span class="hud-pill" id="s-timer">⏱️ 12s</span><span class="hud-pill" id="s-score">⭐
                    0/10</span></div>
            <div id="star-field"></div>
            <div class="countdown" id="s-cd" style="display:none"></div>
            <canvas id="npc-bunny" width="70" height="70"
                style="position:absolute;bottom:30px;left:14px;z-index:8"></canvas>
            <div class="prog-wrap">
                <div class="prog-bar" id="s-prog"></div>
            </div>
        </div>

        <!-- CLOUD PAINTING -->
        <div class="scene" id="scene-clouds">
            <div class="hud"><span class="hud-pill">🎨 Bulutları Boya!</span><span class="hud-pill" id="c-score">☁️
                    0/8</span></div>
            <div id="cloud-area"></div>
            <canvas id="npc-cat" width="70" height="70"
                style="position:absolute;bottom:30px;left:14px;z-index:8"></canvas>
            <div class="prog-wrap">
                <div class="prog-bar" id="c-prog"></div>
            </div>
        </div>

        <!-- MUSIC RHYTHM -->
        <div class="scene" id="scene-rhythm">
            <div class="hud"><span class="hud-pill">🎵 Notaları Yakala!</span><span class="hud-pill" id="r-score">🎵
                    0/12</span></div>
            <div id="rhythm-area">
                <div id="catch-zone">🎯 YAKALA</div>
            </div>
            <canvas id="npc-robot" width="70" height="70"
                style="position:absolute;bottom:30px;left:14px;z-index:8"></canvas>
            <div class="prog-wrap">
                <div class="prog-bar" id="r-prog"></div>
            </div>
        </div>

        <!-- FINALE -->
        <div class="scene" id="scene-finale">
            <canvas id="confetti-cv"></canvas>
            <div style="z-index:2">
                <canvas id="fairy-fin-cv" width="120" height="120" style="margin:0 auto;display:block"></canvas>
                <p id="fin-title" style="font-size:clamp(20px,5vw,34px);color:#e8e0f0;margin:8px 0"></p>
                <p id="fin-sub" style="font-size:clamp(13px,2.5vw,17px);color:#b0a0c8;margin-bottom:24px"></p>
                <button class="btn btn-p" id="btn-restart">Tekrar Oyna 🌟</button>
            </div>
        </div>

    </div>
    <script>
        (() => {
            "use strict";

            /* ═══════════════════════════════════
               AUDIO ENGINE (Web Audio API)
               All sounds are generated procedurally.
               ═══════════════════════════════════ */
            let audioCtx;
            function initAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)() }

            // Short sparkle/collect sound
            function sfxCollect() {
                initAudio();
                const o = audioCtx.createOscillator(), g = audioCtx.createGain();
                o.connect(g); g.connect(audioCtx.destination);
                o.type = "sine"; o.frequency.setValueAtTime(800, audioCtx.currentTime);
                o.frequency.exponentialRampToValueAtTime(1200, audioCtx.currentTime + .1);
                g.gain.setValueAtTime(.15, audioCtx.currentTime);
                g.gain.exponentialRampToValueAtTime(.001, audioCtx.currentTime + .3);
                o.start(); o.stop(audioCtx.currentTime + .3);
            }

            // Fairy speech blip
            function sfxBlip() {
                initAudio();
                const o = audioCtx.createOscillator(), g = audioCtx.createGain();
                o.connect(g); g.connect(audioCtx.destination);
                o.type = "sine"; o.frequency.value = 500 + Math.random() * 300;
                g.gain.setValueAtTime(.04, audioCtx.currentTime);
                g.gain.exponentialRampToValueAtTime(.001, audioCtx.currentTime + .08);
                o.start(); o.stop(audioCtx.currentTime + .08);
            }

            // Success fanfare
            function sfxSuccess() {
                initAudio();
                const notes = [523, 659, 784, 1047];
                notes.forEach((freq, i) => {
                    const o = audioCtx.createOscillator(), g = audioCtx.createGain();
                    o.connect(g); g.connect(audioCtx.destination);
                    o.type = "triangle"; o.frequency.value = freq;
                    g.gain.setValueAtTime(.1, audioCtx.currentTime + i * .15);
                    g.gain.exponentialRampToValueAtTime(.001, audioCtx.currentTime + i * .15 + .4);
                    o.start(audioCtx.currentTime + i * .15);
                    o.stop(audioCtx.currentTime + i * .15 + .4);
                });
            }

            // Note catch sound (musical)
            function sfxNote(idx) {
                initAudio();
                const scale = [262, 294, 330, 349, 392, 440, 494, 523, 587, 659, 698, 784];
                const o = audioCtx.createOscillator(), g = audioCtx.createGain();
                o.connect(g); g.connect(audioCtx.destination);
                o.type = "sine"; o.frequency.value = scale[idx % scale.length];
                g.gain.setValueAtTime(.12, audioCtx.currentTime);
                g.gain.exponentialRampToValueAtTime(.001, audioCtx.currentTime + .25);
                o.start(); o.stop(audioCtx.currentTime + .25);
            }

            // Background lullaby
            let lullabyOn = false, lullabyOscs = [];
            function startLullaby() {
                if (lullabyOn) return; initAudio(); lullabyOn = true;
                // Simple repeating melody using 2 gentle oscillators
                const melody = [262, 294, 330, 294, 262, 330, 349, 330, 294, 262, 330, 294];
                let idx = 0;
                function playNote() {
                    if (!lullabyOn) return;
                    const o = audioCtx.createOscillator(), g = audioCtx.createGain();
                    o.connect(g); g.connect(audioCtx.destination);
                    o.type = "sine"; o.frequency.value = melody[idx % melody.length];
                    g.gain.setValueAtTime(.035, audioCtx.currentTime);
                    g.gain.linearRampToValueAtTime(.035, audioCtx.currentTime + .4);
                    g.gain.exponentialRampToValueAtTime(.001, audioCtx.currentTime + .7);
                    o.start(); o.stop(audioCtx.currentTime + .7);
                    lullabyOscs.push(setTimeout(playNote, 700));
                    idx++;
                }
                // Pad: sustained low note
                const pad = audioCtx.createOscillator(), pg = audioCtx.createGain();
                pad.connect(pg); pg.connect(audioCtx.destination);
                pad.type = "sine"; pad.frequency.value = 131;
                pg.gain.value = .02; pad.start();
                lullabyOscs.push(pad, pg);
                playNote();
            }
            function stopLullaby() {
                lullabyOn = false;
                lullabyOscs.forEach(x => { if (typeof x === "number") clearTimeout(x); else try { x.stop?.() } catch (e) { } });
                lullabyOscs = [];
            }

            // Music toggle
            let musicEnabled = false;
            document.getElementById("music-btn").onclick = () => {
                initAudio(); musicEnabled = !musicEnabled;
                document.getElementById("music-btn").textContent = musicEnabled ? "🔊" : "🎵";
                if (musicEnabled) startLullaby(); else stopLullaby();
            };

            /* ═══════════════════════════════════
               CANVAS FAIRY — Enhanced with sparkle
               trail wings, eye blink, flowing hair
               ═══════════════════════════════════ */
            let fairyFrame = 0;
            const wingTrail = []; // sparkle trail storage

            function drawFairy(canvasEl) {
                const cv = canvasEl, ctx = cv.getContext("2d"), w = cv.width, h = cv.height;
                ctx.clearRect(0, 0, w, h);
                const cx = w / 2, cy = h / 2 + Math.sin(fairyFrame * .04) * 6;
                fairyFrame++;
                const t = fairyFrame;

                // Outer glow - pulsing
                const glowR = 50 + Math.sin(t * .03) * 8;
                const grd = ctx.createRadialGradient(cx, cy, 5, cx, cy, glowR);
                grd.addColorStop(0, "rgba(206,147,216,.3)"); grd.addColorStop(.6, "rgba(248,187,208,.08)"); grd.addColorStop(1, "transparent");
                ctx.fillStyle = grd; ctx.fillRect(0, 0, w, h);

                // Wings with sparkle trail
                const wingAng = Math.sin(t * .07) * .35;
                const wingTips = [];
                // Outer wings
                ctx.fillStyle = `rgba(206,147,216,${.25 + Math.sin(t * .05) * .1})`;
                ctx.beginPath(); ctx.ellipse(cx - 20, cy - 5, 20, 30, -.4 + wingAng, 0, Math.PI * 2); ctx.fill();
                ctx.beginPath(); ctx.ellipse(cx + 20, cy - 5, 20, 30, .4 - wingAng, 0, Math.PI * 2); ctx.fill();
                // Inner wings
                ctx.fillStyle = "rgba(248,187,208,.25)";
                ctx.beginPath(); ctx.ellipse(cx - 14, cy, 14, 22, -.3 + wingAng, 0, Math.PI * 2); ctx.fill();
                ctx.beginPath(); ctx.ellipse(cx + 14, cy, 14, 22, .3 - wingAng, 0, Math.PI * 2); ctx.fill();
                // Wing vein lines
                ctx.strokeStyle = "rgba(206,147,216,.2)"; ctx.lineWidth = .5;
                ctx.beginPath(); ctx.moveTo(cx - 8, cy - 2); ctx.lineTo(cx - 32, cy - 18); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(cx + 8, cy - 2); ctx.lineTo(cx + 32, cy - 18); ctx.stroke();
                // Wing tip positions for sparkle
                wingTips.push({ x: cx - 32 + Math.cos(wingAng) * 5, y: cy - 18 });
                wingTips.push({ x: cx + 32 - Math.cos(wingAng) * 5, y: cy - 18 });

                // Wing sparkle trail
                if (t % 3 === 0) wingTips.forEach(tp => wingTrail.push({ x: tp.x, y: tp.y, life: 1, color: t % 6 === 0 ? "#f8bbd0" : "#ce93d8" }));
                for (let i = wingTrail.length - 1; i >= 0; i--) {
                    const p = wingTrail[i]; p.life -= .04; p.y += .3;
                    if (p.life <= 0) { wingTrail.splice(i, 1); continue; }
                    ctx.globalAlpha = p.life * .6;
                    ctx.fillStyle = p.color;
                    ctx.beginPath(); ctx.arc(p.x + Math.sin(p.life * 8) * 2, p.y, 1.5 * p.life, 0, Math.PI * 2); ctx.fill();
                }
                ctx.globalAlpha = 1;

                // Body
                ctx.fillStyle = "#ffcc80";
                ctx.beginPath(); ctx.ellipse(cx, cy + 8, 9, 14, 0, 0, Math.PI * 2); ctx.fill();
                // Dress with gradient
                const dressGrd = ctx.createLinearGradient(cx, cy + 10, cx, cy + 30);
                dressGrd.addColorStop(0, "#ce93d8"); dressGrd.addColorStop(1, "#ab47bc");
                ctx.fillStyle = dressGrd;
                ctx.beginPath(); ctx.moveTo(cx - 9, cy + 10); ctx.quadraticCurveTo(cx - 16, cy + 20, cx - 14, cy + 28);
                ctx.lineTo(cx + 14, cy + 28); ctx.quadraticCurveTo(cx + 16, cy + 20, cx + 9, cy + 10); ctx.fill();
                // Dress sparkle
                ctx.fillStyle = "rgba(255,255,255,.3)";
                for (let i = 0; i < 3; i++) { const dy = 14 + i * 5, dx = Math.sin(t * .06 + i) * 4; ctx.beginPath(); ctx.arc(cx + dx, cy + dy, 1, 0, Math.PI * 2); ctx.fill(); }

                // Head
                ctx.fillStyle = "#ffcc80";
                ctx.beginPath(); ctx.arc(cx, cy - 8, 12, 0, Math.PI * 2); ctx.fill();

                // Flowing hair
                ctx.fillStyle = "#ffa726";
                ctx.beginPath(); ctx.arc(cx, cy - 12, 12, Math.PI, 0); ctx.fill();
                // Hair strands that flow
                ctx.strokeStyle = "#ff9800"; ctx.lineWidth = 2; ctx.lineCap = "round";
                for (let i = 0; i < 5; i++) {
                    const sx2 = cx - 10 + i * 5, hairWave = Math.sin(t * .06 + i * .8) * 3;
                    ctx.beginPath(); ctx.moveTo(sx2, cy - 6);
                    ctx.quadraticCurveTo(sx2 + hairWave, cy + 2, sx2 + hairWave * 1.5, cy + 8 + i * 1.5); ctx.stroke();
                }
                ctx.lineCap = "butt";

                // Eyes with blinking
                const blinkCycle = t % 180; // blink every ~3 seconds
                const isBlinking = blinkCycle > 170 && blinkCycle < 178;
                if (isBlinking) {
                    // Closed eyes (blink)
                    ctx.strokeStyle = "#5d4037"; ctx.lineWidth = 1.5;
                    ctx.beginPath(); ctx.moveTo(cx - 6, cy - 7); ctx.lineTo(cx - 2, cy - 7); ctx.stroke();
                    ctx.beginPath(); ctx.moveTo(cx + 2, cy - 7); ctx.lineTo(cx + 6, cy - 7); ctx.stroke();
                } else {
                    // Open eyes
                    ctx.fillStyle = "#fff";
                    ctx.beginPath(); ctx.ellipse(cx - 4, cy - 7, 3, 2.5, 0, 0, Math.PI * 2); ctx.fill();
                    ctx.beginPath(); ctx.ellipse(cx + 4, cy - 7, 3, 2.5, 0, 0, Math.PI * 2); ctx.fill();
                    ctx.fillStyle = "#5d4037";
                    const lookX = Math.sin(t * .02) * 1;
                    ctx.beginPath(); ctx.arc(cx - 4 + lookX, cy - 7, 1.5, 0, Math.PI * 2); ctx.fill();
                    ctx.beginPath(); ctx.arc(cx + 4 + lookX, cy - 7, 1.5, 0, Math.PI * 2); ctx.fill();
                    ctx.fillStyle = "#fff";
                    ctx.beginPath(); ctx.arc(cx - 3 + lookX, cy - 8, .8, 0, Math.PI * 2); ctx.fill();
                    ctx.beginPath(); ctx.arc(cx + 5 + lookX, cy - 8, .8, 0, Math.PI * 2); ctx.fill();
                }
                // Smile
                ctx.strokeStyle = "#5d4037"; ctx.lineWidth = 1.2;
                ctx.beginPath(); ctx.arc(cx, cy - 3, 5, .15, Math.PI - .15); ctx.stroke();
                // Rosy cheeks
                ctx.fillStyle = "rgba(244,143,177,.4)";
                ctx.beginPath(); ctx.ellipse(cx - 9, cy - 3, 3.5, 2, 0, 0, Math.PI * 2); ctx.fill();
                ctx.beginPath(); ctx.ellipse(cx + 9, cy - 3, 3.5, 2, 0, 0, Math.PI * 2); ctx.fill();

                // Crown/tiara
                ctx.fillStyle = "#fff176";
                ctx.beginPath(); ctx.moveTo(cx - 6, cy - 18); ctx.lineTo(cx - 4, cy - 23); ctx.lineTo(cx - 2, cy - 18);
                ctx.lineTo(cx, cy - 25); ctx.lineTo(cx + 2, cy - 18); ctx.lineTo(cx + 4, cy - 23); ctx.lineTo(cx + 6, cy - 18); ctx.fill();

                // Wand with glow
                ctx.strokeStyle = "#ffcc80"; ctx.lineWidth = 2.5;
                ctx.beginPath(); ctx.moveTo(cx + 14, cy); ctx.lineTo(cx + 32, cy - 20); ctx.stroke();
                const sx = cx + 32, sy = cy - 20;
                // Wand glow
                const wGrd = ctx.createRadialGradient(sx, sy, 2, sx, sy, 14);
                wGrd.addColorStop(0, "rgba(255,241,118,.4)"); wGrd.addColorStop(1, "transparent");
                ctx.fillStyle = wGrd; ctx.fillRect(sx - 15, sy - 15, 30, 30);
                // Wand star (rotating)
                ctx.fillStyle = "#fff176";
                ctx.save(); ctx.translate(sx, sy); ctx.rotate(t * .03);
                ctx.beginPath();
                for (let i = 0; i < 10; i++) { const a = (Math.PI / 5) * i - Math.PI / 2, r = i % 2 === 0 ? 7 : 3; ctx.lineTo(Math.cos(a) * r, Math.sin(a) * r); }
                ctx.closePath(); ctx.fill(); ctx.restore();

                // Orbiting sparkles around wand
                for (let i = 0; i < 5; i++) {
                    const a = t * .08 + i * 1.26, r = 10 + Math.sin(t * .05 + i) * 4;
                    ctx.globalAlpha = .5 + Math.sin(t * .1 + i) * .3;
                    ctx.fillStyle = i % 2 === 0 ? "#fff176" : "#f8bbd0";
                    ctx.beginPath(); ctx.arc(sx + Math.cos(a) * r, sy + Math.sin(a) * r, 1.5, 0, Math.PI * 2); ctx.fill();
                }
                ctx.globalAlpha = 1;
            }

            /* ═══════════════════════════════════
               NPC HELPERS — Bunny, Cat, Robot
               ═══════════════════════════════════ */
            function drawNPC(canvasEl, type, frame) {
                const cv = canvasEl, ctx = cv.getContext("2d"), w = cv.width, h = cv.height;
                ctx.clearRect(0, 0, w, h);
                const cx = w / 2, cy = h / 2 + Math.sin(frame * .05) * 3;
                const blink = (frame % 150) > 140 && (frame % 150) < 148;

                if (type === "bunny") {
                    // Ears
                    ctx.fillStyle = "#f8bbd0";
                    ctx.beginPath(); ctx.ellipse(cx - 8, cy - 24, 5, 16, -.15, 0, Math.PI * 2); ctx.fill();
                    ctx.beginPath(); ctx.ellipse(cx + 8, cy - 24, 5, 16, .15, 0, Math.PI * 2); ctx.fill();
                    ctx.fillStyle = "#f48fb1";
                    ctx.beginPath(); ctx.ellipse(cx - 8, cy - 24, 3, 10, -.15, 0, Math.PI * 2); ctx.fill();
                    ctx.beginPath(); ctx.ellipse(cx + 8, cy - 24, 3, 10, .15, 0, Math.PI * 2); ctx.fill();
                    // Body
                    ctx.fillStyle = "#fff";
                    ctx.beginPath(); ctx.ellipse(cx, cy + 6, 14, 16, 0, 0, Math.PI * 2); ctx.fill();
                    // Head
                    ctx.beginPath(); ctx.arc(cx, cy - 6, 13, 0, Math.PI * 2); ctx.fill();
                    // Eyes
                    if (blink) { ctx.strokeStyle = "#5d4037"; ctx.lineWidth = 1.5; ctx.beginPath(); ctx.moveTo(cx - 6, cy - 6); ctx.lineTo(cx - 2, cy - 6); ctx.stroke(); ctx.beginPath(); ctx.moveTo(cx + 2, cy - 6); ctx.lineTo(cx + 6, cy - 6); ctx.stroke(); }
                    else { ctx.fillStyle = "#5d4037"; ctx.beginPath(); ctx.arc(cx - 4, cy - 6, 2, 0, Math.PI * 2); ctx.fill(); ctx.beginPath(); ctx.arc(cx + 4, cy - 6, 2, 0, Math.PI * 2); ctx.fill(); ctx.fillStyle = "#fff"; ctx.beginPath(); ctx.arc(cx - 3, cy - 7, .8, 0, Math.PI * 2); ctx.fill(); ctx.beginPath(); ctx.arc(cx + 5, cy - 7, .8, 0, Math.PI * 2); ctx.fill(); }
                    // Nose & mouth
                    ctx.fillStyle = "#f48fb1"; ctx.beginPath(); ctx.ellipse(cx, cy - 2, 2, 1.5, 0, 0, Math.PI * 2); ctx.fill();
                    ctx.strokeStyle = "#5d4037"; ctx.lineWidth = .8; ctx.beginPath(); ctx.moveTo(cx, cy - .5); ctx.lineTo(cx - 3, cy + 2); ctx.moveTo(cx, cy - .5); ctx.lineTo(cx + 3, cy + 2); ctx.stroke();
                    // Cheeks
                    ctx.fillStyle = "rgba(244,143,177,.3)"; ctx.beginPath(); ctx.ellipse(cx - 9, cy - 2, 3, 2, 0, 0, Math.PI * 2); ctx.fill(); ctx.beginPath(); ctx.ellipse(cx + 9, cy - 2, 3, 2, 0, 0, Math.PI * 2); ctx.fill();
                    // Tail (idle bounce)
                    const tailBounce = Math.sin(frame * .1) * 2;
                    ctx.fillStyle = "#fff"; ctx.beginPath(); ctx.arc(cx + 12, cy + 14 + tailBounce, 5, 0, Math.PI * 2); ctx.fill();
                }
                else if (type === "cat") {
                    // Ears
                    ctx.fillStyle = "#ffcc80";
                    ctx.beginPath(); ctx.moveTo(cx - 12, cy - 8); ctx.lineTo(cx - 8, cy - 24); ctx.lineTo(cx - 2, cy - 10); ctx.fill();
                    ctx.beginPath(); ctx.moveTo(cx + 12, cy - 8); ctx.lineTo(cx + 8, cy - 24); ctx.lineTo(cx + 2, cy - 10); ctx.fill();
                    ctx.fillStyle = "#f8bbd0";
                    ctx.beginPath(); ctx.moveTo(cx - 10, cy - 10); ctx.lineTo(cx - 8, cy - 20); ctx.lineTo(cx - 4, cy - 11); ctx.fill();
                    ctx.beginPath(); ctx.moveTo(cx + 10, cy - 10); ctx.lineTo(cx + 8, cy - 20); ctx.lineTo(cx + 4, cy - 11); ctx.fill();
                    // Body
                    ctx.fillStyle = "#ffcc80"; ctx.beginPath(); ctx.ellipse(cx, cy + 6, 13, 16, 0, 0, Math.PI * 2); ctx.fill();
                    // Head
                    ctx.beginPath(); ctx.arc(cx, cy - 5, 13, 0, Math.PI * 2); ctx.fill();
                    // Eyes
                    if (blink) { ctx.strokeStyle = "#5d4037"; ctx.lineWidth = 1.5; ctx.beginPath(); ctx.moveTo(cx - 7, cy - 5); ctx.lineTo(cx - 2, cy - 5); ctx.stroke(); ctx.beginPath(); ctx.moveTo(cx + 2, cy - 5); ctx.lineTo(cx + 7, cy - 5); ctx.stroke(); }
                    else { ctx.fillStyle = "#4caf50"; ctx.beginPath(); ctx.ellipse(cx - 4, cy - 5, 3, 3.5, 0, 0, Math.PI * 2); ctx.fill(); ctx.beginPath(); ctx.ellipse(cx + 4, cy - 5, 3, 3.5, 0, 0, Math.PI * 2); ctx.fill(); ctx.fillStyle = "#1b5e20"; ctx.beginPath(); ctx.ellipse(cx - 4, cy - 5, 1.2, 2.5, 0, 0, Math.PI * 2); ctx.fill(); ctx.beginPath(); ctx.ellipse(cx + 4, cy - 5, 1.2, 2.5, 0, 0, Math.PI * 2); ctx.fill(); }
                    // Nose & whiskers
                    ctx.fillStyle = "#f48fb1"; ctx.beginPath(); ctx.ellipse(cx, cy, 2, 1.5, 0, 0, Math.PI * 2); ctx.fill();
                    ctx.strokeStyle = "#bbb"; ctx.lineWidth = .6;
                    ctx.beginPath(); ctx.moveTo(cx - 4, cy); ctx.lineTo(cx - 16, cy - 2); ctx.moveTo(cx - 4, cy + 1); ctx.lineTo(cx - 16, cy + 3); ctx.stroke();
                    ctx.beginPath(); ctx.moveTo(cx + 4, cy); ctx.lineTo(cx + 16, cy - 2); ctx.moveTo(cx + 4, cy + 1); ctx.lineTo(cx + 16, cy + 3); ctx.stroke();
                    // Tail (swaying)
                    const tailSway = Math.sin(frame * .06) * 8;
                    ctx.strokeStyle = "#ffcc80"; ctx.lineWidth = 3; ctx.lineCap = "round";
                    ctx.beginPath(); ctx.moveTo(cx + 10, cy + 16); ctx.quadraticCurveTo(cx + 20, cy + 10 + tailSway, cx + 18, cy + tailSway); ctx.stroke();
                    ctx.lineCap = "butt";
                }
                else if (type === "robot") {
                    // Antenna
                    ctx.strokeStyle = "#90caf9"; ctx.lineWidth = 2;
                    ctx.beginPath(); ctx.moveTo(cx, cy - 18); ctx.lineTo(cx, cy - 28); ctx.stroke();
                    ctx.fillStyle = "#ef5350"; ctx.beginPath(); ctx.arc(cx, cy - 29, 3, 0, Math.PI * 2); ctx.fill();
                    // Glow on antenna (pulsing)
                    ctx.globalAlpha = .3 + Math.sin(frame * .1) * .3; ctx.fillStyle = "#ef5350";
                    ctx.beginPath(); ctx.arc(cx, cy - 29, 6, 0, Math.PI * 2); ctx.fill(); ctx.globalAlpha = 1;
                    // Body
                    ctx.fillStyle = "#90caf9";
                    ctx.beginPath(); ctx.roundRect(cx - 14, cy, 28, 22, 4); ctx.fill();
                    // Body detail
                    ctx.fillStyle = "#64b5f6"; ctx.beginPath(); ctx.roundRect(cx - 10, cy + 4, 6, 6, 2); ctx.fill();
                    ctx.fillStyle = "#fff176"; ctx.beginPath(); ctx.roundRect(cx + 4, cy + 4, 6, 6, 2); ctx.fill();
                    // Head
                    ctx.fillStyle = "#bbdefb"; ctx.beginPath(); ctx.roundRect(cx - 13, cy - 18, 26, 20, 5); ctx.fill();
                    // Eyes (LED style)
                    if (blink) { ctx.fillStyle = "#1565c0"; ctx.beginPath(); ctx.roundRect(cx - 8, cy - 10, 5, 2, 1); ctx.fill(); ctx.beginPath(); ctx.roundRect(cx + 3, cy - 10, 5, 2, 1); ctx.fill(); }
                    else { ctx.fillStyle = "#4fc3f7"; ctx.beginPath(); ctx.arc(cx - 5, cy - 9, 3.5, 0, Math.PI * 2); ctx.fill(); ctx.beginPath(); ctx.arc(cx + 5, cy - 9, 3.5, 0, Math.PI * 2); ctx.fill(); ctx.fillStyle = "#fff"; ctx.beginPath(); ctx.arc(cx - 4, cy - 10, 1.2, 0, Math.PI * 2); ctx.fill(); ctx.beginPath(); ctx.arc(cx + 6, cy - 10, 1.2, 0, Math.PI * 2); ctx.fill(); }
                    // Mouth (LED smile)
                    ctx.strokeStyle = "#4fc3f7"; ctx.lineWidth = 1.5;
                    ctx.beginPath(); ctx.arc(cx, cy - 3, 4, .2, Math.PI - .2); ctx.stroke();
                    // Arms (idle wave)
                    const armWave = Math.sin(frame * .08) * 8;
                    ctx.strokeStyle = "#90caf9"; ctx.lineWidth = 3; ctx.lineCap = "round";
                    ctx.beginPath(); ctx.moveTo(cx - 14, cy + 6); ctx.lineTo(cx - 22, cy + 2 + armWave); ctx.stroke();
                    ctx.beginPath(); ctx.moveTo(cx + 14, cy + 6); ctx.lineTo(cx + 22, cy + 2 - armWave); ctx.stroke();
                    ctx.lineCap = "butt";
                    // Feet
                    ctx.fillStyle = "#78909c"; ctx.beginPath(); ctx.roundRect(cx - 11, cy + 22, 8, 5, 2); ctx.fill(); ctx.beginPath(); ctx.roundRect(cx + 3, cy + 22, 8, 5, 2); ctx.fill();
                }
            }

            /* ═══════════════════════════════════
               CHARACTER AVATARS for intro screen
               ═══════════════════════════════════ */
            function drawCharAvatar(canvasEl, charType, frame) {
                const cv = canvasEl, ctx = cv.getContext("2d"), w = cv.width, h = cv.height;
                ctx.clearRect(0, 0, w, h);
                const cx = w / 2, cy = h / 2, t = frame;

                if (charType === "explorer") {
                    // Hat
                    ctx.fillStyle = "#8d6e63"; ctx.beginPath(); ctx.ellipse(cx, cy - 14, 16, 5, 0, 0, Math.PI * 2); ctx.fill();
                    ctx.beginPath(); ctx.arc(cx, cy - 18, 10, Math.PI, 0); ctx.fill();
                    // Face
                    ctx.fillStyle = "#ffcc80"; ctx.beginPath(); ctx.arc(cx, cy - 6, 12, 0, Math.PI * 2); ctx.fill();
                    // Scarf
                    ctx.fillStyle = "#ef5350"; ctx.beginPath(); ctx.roundRect(cx - 10, cy + 4, 20, 6, 2); ctx.fill();
                    // Eyes
                    ctx.fillStyle = "#5d4037"; ctx.beginPath(); ctx.arc(cx - 4, cy - 6, 2, 0, Math.PI * 2); ctx.fill(); ctx.beginPath(); ctx.arc(cx + 4, cy - 6, 2, 0, Math.PI * 2); ctx.fill();
                    ctx.fillStyle = "#fff"; ctx.beginPath(); ctx.arc(cx - 3, cy - 7, .8, 0, Math.PI * 2); ctx.fill();
                    // Smile
                    ctx.strokeStyle = "#5d4037"; ctx.lineWidth = 1; ctx.beginPath(); ctx.arc(cx, cy - 2, 4, .2, Math.PI - .2); ctx.stroke();
                    // Compass glow
                    ctx.globalAlpha = .3 + Math.sin(t * .08) * .2; ctx.fillStyle = "#fff176"; ctx.beginPath(); ctx.arc(cx + 16, cy + 8, 6, 0, Math.PI * 2); ctx.fill(); ctx.globalAlpha = 1;
                }
                else if (charType === "astronaut") {
                    // Helmet
                    ctx.fillStyle = "#e0e0e0"; ctx.beginPath(); ctx.arc(cx, cy - 6, 16, 0, Math.PI * 2); ctx.fill();
                    ctx.fillStyle = "#90caf9"; ctx.globalAlpha = .5; ctx.beginPath(); ctx.arc(cx, cy - 6, 13, 0, Math.PI * 2); ctx.fill(); ctx.globalAlpha = 1;
                    // Face
                    ctx.fillStyle = "#ffcc80"; ctx.beginPath(); ctx.arc(cx, cy - 6, 10, 0, Math.PI * 2); ctx.fill();
                    // Suit
                    ctx.fillStyle = "#e0e0e0"; ctx.beginPath(); ctx.roundRect(cx - 12, cy + 8, 24, 14, 4); ctx.fill();
                    ctx.fillStyle = "#ef5350"; ctx.beginPath(); ctx.arc(cx, cy + 12, 3, 0, Math.PI * 2); ctx.fill();
                    // Eyes
                    ctx.fillStyle = "#5d4037"; ctx.beginPath(); ctx.arc(cx - 4, cy - 6, 1.5, 0, Math.PI * 2); ctx.fill(); ctx.beginPath(); ctx.arc(cx + 4, cy - 6, 1.5, 0, Math.PI * 2); ctx.fill();
                    // Helmet shine
                    ctx.strokeStyle = "rgba(255,255,255,.5)"; ctx.lineWidth = 1.5; ctx.beginPath(); ctx.arc(cx - 6, cy - 12, 6, -.8, .5); ctx.stroke();
                    // Stars around
                    ctx.fillStyle = "#fff176"; ctx.globalAlpha = .4 + Math.sin(t * .1) * .3;
                    ctx.beginPath(); ctx.arc(cx + 18, cy - 14 + Math.sin(t * .06) * 3, 2, 0, Math.PI * 2); ctx.fill(); ctx.globalAlpha = 1;
                }
                else if (charType === "princess") {
                    // Crown
                    ctx.fillStyle = "#fff176";
                    ctx.beginPath(); ctx.moveTo(cx - 10, cy - 14); ctx.lineTo(cx - 7, cy - 24); ctx.lineTo(cx - 4, cy - 16); ctx.lineTo(cx, cy - 26); ctx.lineTo(cx + 4, cy - 16); ctx.lineTo(cx + 7, cy - 24); ctx.lineTo(cx + 10, cy - 14); ctx.fill();
                    ctx.fillStyle = "#ef5350"; ctx.beginPath(); ctx.arc(cx, cy - 23, 2, 0, Math.PI * 2); ctx.fill();
                    // Face
                    ctx.fillStyle = "#ffcc80"; ctx.beginPath(); ctx.arc(cx, cy - 6, 12, 0, Math.PI * 2); ctx.fill();
                    // Hair
                    ctx.fillStyle = "#8d6e63";
                    ctx.beginPath(); ctx.arc(cx, cy - 10, 12, Math.PI, 0); ctx.fill();
                    for (let i = 0; i < 4; i++) { const hx = cx - 10 + i * 7, hw = Math.sin(t * .05 + i) * 2; ctx.beginPath(); ctx.moveTo(hx, cy - 2); ctx.quadraticCurveTo(hx + hw, cy + 8, hx + hw, cy + 14); ctx.lineWidth = 2.5; ctx.strokeStyle = "#8d6e63"; ctx.stroke(); }
                    // Eyes
                    ctx.fillStyle = "#5d4037"; ctx.beginPath(); ctx.arc(cx - 4, cy - 6, 2, 0, Math.PI * 2); ctx.fill(); ctx.beginPath(); ctx.arc(cx + 4, cy - 6, 2, 0, Math.PI * 2); ctx.fill();
                    // Eyelashes
                    ctx.strokeStyle = "#5d4037"; ctx.lineWidth = .8;
                    ctx.beginPath(); ctx.moveTo(cx - 6, cy - 8); ctx.lineTo(cx - 7, cy - 10); ctx.stroke();
                    ctx.beginPath(); ctx.moveTo(cx + 6, cy - 8); ctx.lineTo(cx + 7, cy - 10); ctx.stroke();
                    // Smile
                    ctx.strokeStyle = "#e91e63"; ctx.lineWidth = 1; ctx.beginPath(); ctx.arc(cx, cy - 2, 4, .2, Math.PI - .2); ctx.stroke();
                    // Cheeks
                    ctx.fillStyle = "rgba(244,143,177,.4)"; ctx.beginPath(); ctx.ellipse(cx - 9, cy - 2, 3, 2, 0, 0, Math.PI * 2); ctx.fill(); ctx.beginPath(); ctx.ellipse(cx + 9, cy - 2, 3, 2, 0, 0, Math.PI * 2); ctx.fill();
                }
            }

            // Animate fairy continuously
            let fairyAnimRAF;
            function startFairyAnim(cvId) {
                const cv = document.getElementById(cvId);
                function frame() { drawFairy(cv); fairyAnimRAF = requestAnimationFrame(frame) }
                frame();
            }
            function stopFairyAnim() { if (fairyAnimRAF) cancelAnimationFrame(fairyAnimRAF) }

            // NPC animation system
            let npcAnimRAFs = {};
            function startNPCAnim(cvId, type) {
                const cv = document.getElementById(cvId); let f = 0;
                function frame() { drawNPC(cv, type, f++); npcAnimRAFs[cvId] = requestAnimationFrame(frame) }
                frame();
            }
            function stopNPCAnim(cvId) { if (npcAnimRAFs[cvId]) cancelAnimationFrame(npcAnimRAFs[cvId]) }
            function stopAllNPC() { Object.keys(npcAnimRAFs).forEach(k => { cancelAnimationFrame(npcAnimRAFs[k]); }); npcAnimRAFs = {} }

            /* ═══════════════════════════════════
               SCENE TRANSITIONS
               Star burst / portal effect
               ═══════════════════════════════════ */
            const transOvl = document.getElementById("transition-overlay");
            const transCv = document.getElementById("trans-cv");
            const transCtx = transCv.getContext("2d");

            function transitionEffect(cb) {
                transCv.width = transOvl.parentElement.clientWidth;
                transCv.height = transOvl.parentElement.clientHeight;
                transOvl.style.display = "block";
                const w = transCv.width, h = transCv.height, cx = w / 2, cy = h / 2;
                let t = 0;
                const particles = [];
                for (let i = 0; i < 40; i++)particles.push({
                    x: cx, y: cy, vx: (Math.random() - .5) * 12, vy: (Math.random() - .5) * 12,
                    r: 2 + Math.random() * 4, color: ["#fff176", "#ce93d8", "#f8bbd0", "#90caf9", "#a5d6a7"][i % 5],
                    life: 1
                });

                function frame() {
                    t += .03;
                    transCtx.clearRect(0, 0, w, h);
                    // Portal circle expanding
                    const pr = t * Math.max(w, h);
                    transCtx.globalAlpha = Math.max(0, 1 - t * 1.5);
                    transCtx.fillStyle = "#1a1a2e";
                    transCtx.fillRect(0, 0, w, h);
                    transCtx.globalCompositeOperation = "destination-out";
                    transCtx.beginPath(); transCtx.arc(cx, cy, pr, 0, Math.PI * 2); transCtx.fill();
                    transCtx.globalCompositeOperation = "source-over";
                    transCtx.globalAlpha = 1;

                    // Particles
                    for (const p of particles) {
                        p.x += p.vx; p.y += p.vy; p.life -= .02;
                        if (p.life > 0) {
                            transCtx.globalAlpha = p.life; transCtx.fillStyle = p.color;
                            transCtx.beginPath(); transCtx.arc(p.x, p.y, p.r * p.life, 0, Math.PI * 2); transCtx.fill();
                        }
                    }
                    transCtx.globalAlpha = 1;

                    if (t < 1.2) { requestAnimationFrame(frame) }
                    else { transOvl.style.display = "none"; if (cb) cb() }
                }
                frame();
            }

            /* ═══════════════════════════════════
               SCENE MANAGER
               ═══════════════════════════════════ */
            let curScene = document.getElementById("scene-intro");

            function showScene(id, cb) {
                const el = document.getElementById(id);
                if (curScene) { curScene.style.opacity = "0"; const old = curScene; setTimeout(() => old.classList.remove("active"), 700) }
                setTimeout(() => {
                    el.classList.add("active");
                    requestAnimationFrame(() => requestAnimationFrame(() => el.style.opacity = "1"));
                    curScene = el; if (cb) setTimeout(cb, 500);
                }, curScene ? 750 : 100);
            }

            // Scene transition with effect
            function showSceneWithEffect(id, cb) {
                transitionEffect(() => showScene(id, cb));
            }

            /* ═══════════════════════════════════
               TYPEWRITER with blip sounds
               ═══════════════════════════════════ */
            function typewrite(el, text, cb) {
                el.textContent = ""; let i = 0;
                const iv = setInterval(() => {
                    el.textContent += text[i];
                    if (i % 3 === 0 && musicEnabled) sfxBlip();
                    i++; if (i >= text.length) { clearInterval(iv); if (cb) cb() }
                }, 28);
            }

            /* ═══════════════════════════════════
               DIALOGUE SYSTEM
               ═══════════════════════════════════ */
            function showDialogue(text, choices) {
                const bubble = document.getElementById("dia-bubble"), textEl = document.getElementById("dia-text"), choicesEl = document.getElementById("dia-choices");
                bubble.classList.remove("vis"); choicesEl.classList.remove("vis");
                stopFairyAnim();

                showSceneWithEffect("scene-dialogue", () => {
                    startFairyAnim("fairy-canvas");
                    bubble.classList.add("vis");
                    typewrite(textEl, text, () => {
                        choicesEl.innerHTML = "";
                        const colors = ["btn-p", "btn-k", "btn-b", "btn-g", "btn-gold"];
                        choices.forEach((c, i) => {
                            const btn = document.createElement("button");
                            btn.className = "btn " + colors[i % colors.length];
                            btn.textContent = c.label;
                            btn.onclick = () => { sfxCollect(); choicesEl.classList.remove("vis"); bubble.classList.remove("vis"); stopFairyAnim(); setTimeout(() => c.action(), 500) };
                            choicesEl.appendChild(btn);
                        });
                        choicesEl.classList.add("vis");
                    });
                });
            }

            /* ═══════════════════════════════════
               GAME STATE
               ═══════════════════════════════════ */
            let playerName = "Kaşif", playerChar = "explorer";

            /* ═══════════════════════════════════
               INTRO: NAME + CHARACTER SELECTION
               ═══════════════════════════════════ */
            const introTitle = document.getElementById("intro-title");
            const introSub = document.getElementById("intro-sub");
            const nameInput = document.getElementById("name-input");
            const charOpts = document.getElementById("char-options");
            const introBtn = document.getElementById("intro-start-btn");

            // Phase 1: Click to start
            document.getElementById("scene-intro").onclick = function handler() {
                document.getElementById("scene-intro").onclick = null;
                introTitle.textContent = "Maceraya Hoş Geldin! ✨";
                introSub.textContent = "Adını yaz ve karakterini seç";
                nameInput.style.display = "block";
                charOpts.style.display = "flex";
                introBtn.style.display = "block";
                nameInput.focus();
            };

            // Character selection
            document.querySelectorAll(".char-opt").forEach(opt => {
                opt.onclick = () => {
                    document.querySelectorAll(".char-opt").forEach(o => o.classList.remove("selected"));
                    opt.classList.add("selected");
                    playerChar = opt.dataset.char;
                    sfxCollect();
                };
            });

            // Start button
            introBtn.onclick = () => {
                playerName = nameInput.value.trim() || "Kaşif";
                initAudio();
                // First fairy dialogue
                showDialogue(
                    `Merhaba ${playerName}! Ben bir Dilek Perisi'yim! ✨ Seninle harika bir maceraya çıkacağız! Söyle bakalım, hangi oyunlardan hoşlanırsın?`,
                    [{ label: "Devam ✨", action: () => goToStep(0) }]
                );
            };

            /* ═══════════════════════════════════
               MAP SYSTEM
               ═══════════════════════════════════ */
            const mapCanvas = document.getElementById("map-canvas"), mapCtx = mapCanvas.getContext("2d"), mapLabel = document.getElementById("map-label");
            const MAP_POINTS = [
                { px: .2, py: .7, label: "⭐ Yıldız Ovası", color: "#fff176", emoji: "⭐" },
                { px: .5, py: .35, label: "☁️ Bulut Tepesi", color: "#90caf9", emoji: "☁️" },
                { px: .8, py: .65, label: "🎵 Melodi Vadisi", color: "#ce93d8", emoji: "🎵" },
            ];

            function drawMap(hIdx, rProg) {
                mapCanvas.width = mapCanvas.parentElement.clientWidth; mapCanvas.height = mapCanvas.parentElement.clientHeight;
                const w = mapCanvas.width, h = mapCanvas.height, ctx = mapCtx;
                ctx.clearRect(0, 0, w, h); ctx.fillStyle = "#162447"; ctx.fillRect(0, 0, w, h);
                const grd = ctx.createRadialGradient(w * .5, h * .4, 50, w * .5, h * .4, w * .5);
                grd.addColorStop(0, "rgba(106,27,154,.15)"); grd.addColorStop(1, "transparent");
                ctx.fillStyle = grd; ctx.fillRect(0, 0, w, h);
                for (let i = 0; i < 40; i++) { const sx = (Math.sin(i * 7.3 + 1) * .5 + .5) * w, sy = (Math.sin(i * 3.7 + 2) * .5 + .5) * h; ctx.fillStyle = `rgba(255,255,255,${.2 + Math.sin(i) * .3})`; ctx.beginPath(); ctx.arc(sx, sy, 1 + Math.sin(i * 2) * .5, 0, Math.PI * 2); ctx.fill() }
                const pts = MAP_POINTS.map(p => ({ x: p.px * w, y: p.py * h }));
                ctx.setLineDash([8, 8]); ctx.strokeStyle = "rgba(255,255,255,.2)"; ctx.lineWidth = 3;
                ctx.beginPath(); ctx.moveTo(pts[0].x, pts[0].y);
                const cp1x = (pts[0].x + pts[1].x) / 2, cp1y = pts[0].y - 60; ctx.quadraticCurveTo(cp1x, cp1y, pts[1].x, pts[1].y);
                const cp2x = (pts[1].x + pts[2].x) / 2, cp2y = pts[1].y + 60; ctx.quadraticCurveTo(cp2x, cp2y, pts[2].x, pts[2].y);
                ctx.stroke(); ctx.setLineDash([]);
                if (hIdx > 0) { ctx.strokeStyle = "rgba(206,147,216,.5)"; ctx.lineWidth = 3; ctx.beginPath(); ctx.moveTo(pts[0].x, pts[0].y); if (hIdx >= 1) ctx.quadraticCurveTo(cp1x, cp1y, pts[1].x, pts[1].y); if (hIdx >= 2) ctx.quadraticCurveTo(cp2x, cp2y, pts[2].x, pts[2].y); ctx.stroke() }
                MAP_POINTS.forEach((p, i) => {
                    const x = p.px * w, y = p.py * h, done = i < hIdx, cur = i === hIdx;
                    if (cur) { ctx.globalAlpha = .3 + Math.sin(Date.now() * .003) * .15; ctx.fillStyle = p.color; ctx.beginPath(); ctx.arc(x, y, 36, 0, Math.PI * 2); ctx.fill(); ctx.globalAlpha = 1 }
                    ctx.fillStyle = done ? p.color : (cur ? p.color : "rgba(255,255,255,.15)"); ctx.globalAlpha = done ? .9 : (cur ? 1 : .4);
                    ctx.beginPath(); ctx.arc(x, y, 22, 0, Math.PI * 2); ctx.fill(); ctx.globalAlpha = 1;
                    if (done) { ctx.fillStyle = "#1a1a2e"; ctx.font = "bold 18px Quicksand"; ctx.textAlign = "center"; ctx.textBaseline = "middle"; ctx.fillText("✓", x, y) }
                    else { ctx.font = "20px serif"; ctx.textAlign = "center"; ctx.textBaseline = "middle"; ctx.fillText(p.emoji, x, y - 1) }
                    ctx.font = `${cur ? "bold " : ""}13px Quicksand`; ctx.fillStyle = cur ? "#fff" : "rgba(255,255,255,.5)"; ctx.textAlign = "center"; ctx.fillText(p.label, x, y + 36);
                    ctx.font = "bold 11px Quicksand"; ctx.fillStyle = "rgba(255,255,255,.6)"; ctx.fillText(`Durak ${i + 1}`, x, y + 50);
                });
                if (rProg !== undefined && rProg >= 0) {
                    const fi = Math.max(0, hIdx - 1), ti = hIdx;
                    if (ti < pts.length) {
                        const from = pts[fi], to = pts[ti], t = rProg;
                        let cpx, cpy; if (ti === 1) { cpx = (from.x + to.x) / 2; cpy = from.y - 60 } else { cpx = (from.x + to.x) / 2; cpy = from.y + 60 }
                        const rx = (1 - t) * (1 - t) * from.x + 2 * (1 - t) * t * cpx + t * t * to.x, ry = (1 - t) * (1 - t) * from.y + 2 * (1 - t) * t * cpy + t * t * to.y;
                        ctx.globalAlpha = .5; ctx.fillStyle = "#ffcc80";
                        for (let i = 0; i < 5; i++) { const tt = Math.max(0, t - i * .03), tx = (1 - tt) * (1 - tt) * from.x + 2 * (1 - tt) * tt * cpx + tt * tt * to.x, ty = (1 - tt) * (1 - tt) * from.y + 2 * (1 - tt) * tt * cpy + tt * tt * to.y; ctx.globalAlpha = .3 - i * .05; ctx.beginPath(); ctx.arc(tx, ty, 4 - i * .5, 0, Math.PI * 2); ctx.fill() }
                        ctx.globalAlpha = 1;
                        // Player character emoji
                        const charEmoji = playerChar === "astronaut" ? "👨‍🚀" : playerChar === "princess" ? "👸" : "🧭";
                        ctx.font = "28px serif"; ctx.textAlign = "center"; ctx.textBaseline = "middle"; ctx.fillText(charEmoji, rx, ry);
                    }
                }
            }

            function animateMapTravel(tIdx, cb) {
                mapLabel.classList.remove("vis");
                showSceneWithEffect("scene-map", () => {
                    mapLabel.textContent = MAP_POINTS[tIdx].label + "'e yolculuk!"; mapLabel.classList.add("vis");
                    let p = 0; const spd = .012;
                    function frame() {
                        p += spd; if (p >= 1) p = 1; drawMap(tIdx, p); if (p < 1) requestAnimationFrame(frame);
                        else { mapLabel.textContent = MAP_POINTS[tIdx].label + " — Vardık! 🎉"; sfxSuccess(); setTimeout(() => { mapLabel.classList.remove("vis"); if (cb) cb() }, 1200) }
                    }
                    drawMap(tIdx, 0); setTimeout(() => requestAnimationFrame(frame), 600);
                });
            }

            /* ═══════════════════════════════════
               GAME FLOW
               ═══════════════════════════════════ */
            function goToStep(step) {
                animateMapTravel(step, () => {
                    if (step === 0) startStarGame();
                    else if (step === 1) startCloudGame();
                    else if (step === 2) startRhythmGame();
                });
            }

            function afterMinigame1() {
                showDialogue(
                    `Süpersin ${playerName}! Yıldızları harika topladın! ⭐✨ Şimdi seni biraz daha tanımak istiyorum... Hobilerin neler?`,
                    [{ label: "Devam ✨", action: () => goToStep(1) }]
                );
            }
            function afterMinigame2() {
                showDialogue(
                    `Harikasın ${playerName}! Bulutları renklendirdin ve gökyüzü çok güzel oldu! 🌈☁️ Son durağımız Melodi Vadisi! Orada müzik notalarını yakalayacağız!`,
                    [{ label: "Devam ✨", action: () => goToStep(2) }]
                );
            }
            function afterMinigame3() {
                showDialogue(
                    `İnanılmaz ${playerName}! Üç maceraya da başarıyla tamamladın! 🌟 Sen gerçekten cesur ve yetenekli bir kaşifsin! Peki şimdi... Dileğin ne?`,
                    [
                        { label: "🌈 Herkes mutlu olsun!", action: () => showFinale("happy") },
                        { label: "⭐ Dünya ışıkla dolsun!", action: () => showFinale("shine") },
                        { label: "💖 Herkes sağlıklı olsun!", action: () => showFinale("health") },
                    ]
                );
            }

            /* ═══════════════════════════════════
               MINIGAME 1: STAR COLLECTION
               ═══════════════════════════════════ */
            let starsGot = 0, totalStars = 10, sTimer = null, sSpawner = null, sTime = 12;
            function startStarGame() {
                starsGot = 0; sTime = 12; stopAllNPC();
                const f = document.getElementById("star-field"); f.innerHTML = "";
                document.getElementById("s-prog").style.width = "0%"; updStarHUD();
                showSceneWithEffect("scene-stars", () => {
                    startNPCAnim("npc-bunny", "bunny");
                    let c = 3; const cd = document.getElementById("s-cd"); cd.style.display = "flex"; cd.textContent = c;
                    const ci = setInterval(() => {
                        c--; if (c > 0) { cd.textContent = c; cd.style.animation = "none"; void cd.offsetHeight; cd.style.animation = "cpop .6s ease-out" }
                        else { clearInterval(ci); cd.textContent = "Başla! ⭐"; setTimeout(() => { cd.style.display = "none"; runStars() }, 500) }
                    }, 700);
                });
            }
            function runStars() {
                const f = document.getElementById("star-field");
                for (let i = 0; i < 4; i++)spawnStar(f, i * 120);
                sSpawner = setInterval(() => { if (f.querySelectorAll(".star:not(.got)").length < 4) spawnStar(f, 0) }, 700);
                sTimer = setInterval(() => { sTime--; updStarHUD(); if (sTime <= 0) endStars() }, 1000);
            }
            function spawnStar(f, delay) {
                const s = document.createElement("div"); s.className = "star"; s.textContent = "⭐";
                s.style.left = (25 + Math.random() * (f.clientWidth - 70)) + "px"; s.style.top = (55 + Math.random() * (f.clientHeight - 130)) + "px"; s.style.animationDelay = delay + "ms";
                s.onclick = () => { if (s.classList.contains("got")) return; s.classList.add("got"); starsGot++; sfxCollect(); updStarHUD(); burst(s, f); setTimeout(() => s.remove(), 400); if (starsGot >= totalStars) endStars() };
                f.appendChild(s);
            }
            function updStarHUD() { document.getElementById("s-timer").textContent = `⏱️ ${sTime}s`; document.getElementById("s-timer").style.color = sTime <= 3 ? "#ef9a9a" : "#fff176"; document.getElementById("s-score").textContent = `⭐ ${starsGot}/${totalStars}`; document.getElementById("s-prog").style.width = (starsGot / totalStars * 100) + "%" }
            function endStars() { clearInterval(sTimer); clearInterval(sSpawner); stopAllNPC(); sfxSuccess(); setTimeout(() => afterMinigame1(), 700) }

            /* ═══════════════════════════════════
               MINIGAME 2: CLOUD PAINTING
               ═══════════════════════════════════ */
            let cPainted = 0, totalClouds = 8;
            function startCloudGame() {
                cPainted = 0; stopAllNPC(); const area = document.getElementById("cloud-area"); area.innerHTML = "";
                document.getElementById("c-score").textContent = `☁️ 0/${totalClouds}`; document.getElementById("c-prog").style.width = "0%";
                const colors = ["#f8bbd0", "#ce93d8", "#90caf9", "#a5d6a7", "#fff176", "#ffcc80", "#ef9a9a", "#80deea"];
                showSceneWithEffect("scene-clouds", () => {
                    startNPCAnim("npc-cat", "cat");
                    for (let i = 0; i < totalClouds; i++) {
                        const cl = document.createElement("div"); cl.className = "cloud";
                        cl.onclick = () => {
                            if (cl.classList.contains("painted")) return; cl.style.background = colors[i % colors.length]; cl.classList.add("painted"); cPainted++; sfxCollect();
                            document.getElementById("c-score").textContent = `☁️ ${cPainted}/${totalClouds}`; document.getElementById("c-prog").style.width = (cPainted / totalClouds * 100) + "%";
                            burst(cl, area); if (cPainted >= totalClouds) { stopAllNPC(); sfxSuccess(); setTimeout(() => afterMinigame2(), 800) }
                        };
                        area.appendChild(cl);
                    }
                });
            }

            /* ═══════════════════════════════════
               MINIGAME 3: MUSIC RHYTHM
               Notes fall from top, catch them in 
               the catch zone at the bottom.
               ═══════════════════════════════════ */
            let notesGot = 0, totalNotes = 12, rSpawner = null, noteIdx = 0;
            function startRhythmGame() {
                notesGot = 0; noteIdx = 0; stopAllNPC();
                const area = document.getElementById("rhythm-area");
                // Clear old notes but keep catch-zone
                area.querySelectorAll(".note,.spark").forEach(n => n.remove());
                document.getElementById("r-score").textContent = `🎵 0/${totalNotes}`; document.getElementById("r-prog").style.width = "0%";
                showSceneWithEffect("scene-rhythm", () => {
                    startNPCAnim("npc-robot", "robot");
                    const noteEmojis = ["🎵", "🎶", "🎵", "🎶", "🎵", "🎶", "🎵", "🎶", "🎵", "🎶", "🎵", "🎶"];
                    let spawned = 0;
                    rSpawner = setInterval(() => {
                        if (spawned >= totalNotes) { clearInterval(rSpawner); return }
                        const n = document.createElement("div"); n.className = "note"; n.textContent = noteEmojis[spawned % noteEmojis.length];
                        // Random horizontal position within center area
                        const areaW = area.clientWidth;
                        n.style.left = (areaW / 2 - 60 + Math.random() * 120) + "px";
                        n.style.animationDuration = (3 + Math.random()) + "s";
                        const myIdx = spawned;
                        n.onclick = () => {
                            if (n.classList.contains("caught")) return;
                            // Check if note is in catch zone area (bottom 30%)
                            const nRect = n.getBoundingClientRect(), aRect = area.getBoundingClientRect();
                            const nY = nRect.top - aRect.top;
                            const catchTop = area.clientHeight - 120;
                            if (nY > catchTop - 40) {
                                n.classList.add("caught"); notesGot++; sfxNote(myIdx);
                                document.getElementById("r-score").textContent = `🎵 ${notesGot}/${totalNotes}`;
                                document.getElementById("r-prog").style.width = (notesGot / totalNotes * 100) + "%";
                                burst(n, area); setTimeout(() => n.remove(), 400);
                                if (notesGot >= totalNotes) { clearInterval(rSpawner); sfxSuccess(); setTimeout(() => afterMinigame3(), 800) }
                            }
                        };
                        // Auto-remove when animation ends
                        const dur = parseFloat(n.style.animationDuration) * 1000;
                        setTimeout(() => { if (!n.classList.contains("caught")) n.remove() }, dur);
                        area.appendChild(n); spawned++;
                    }, 800);
                });
            }

            /* ═══════════════════════════════════
               FINALE
               ═══════════════════════════════════ */
            function showFinale(type) {
                const t = document.getElementById("fin-title"), s = document.getElementById("fin-sub");
                if (type === "happy") { t.textContent = "🌈 Herkes Mutlu Oldu! 🌈"; s.textContent = `${playerName}, dileğin tüm evrene yayıldı! Herkes gülümsüyor. Sen gerçek bir dilek yıldızısın! 💛✨` }
                else if (type === "shine") { t.textContent = "⭐ Dünya Işıkla Doldu! ⭐"; s.textContent = `${playerName}, dileğin gerçek oldu! Her karanlık köşeye ışık taşıdın. Parlayan bir yıldızsın! 🌟💫` }
                else { t.textContent = "💖 Herkes Sağlıklı Oldu! 💖"; s.textContent = `${playerName}, dileğin tüm kalplere dokundu! Sevginle dünyayı iyileştirdin. Sen bir mucizesin! 🌸✨` }
                showSceneWithEffect("scene-finale", () => { startConfetti(); startFairyAnim("fairy-fin-cv") });
            }
            let confRAF;
            function startConfetti() {
                const cv = document.getElementById("confetti-cv"); cv.width = cv.parentElement.clientWidth; cv.height = cv.parentElement.clientHeight;
                const cx = cv.getContext("2d"), pcs = [];
                const cols = ["#fff176", "#f8bbd0", "#ce93d8", "#90caf9", "#a5d6a7", "#ffcc80", "#ef9a9a"];
                for (let i = 0; i < 100; i++)pcs.push({ x: Math.random() * cv.width, y: Math.random() * cv.height - cv.height, w: 5 + Math.random() * 7, h: 3 + Math.random() * 5, vy: 1 + Math.random() * 2.5, vx: (Math.random() - .5) * 2, rot: Math.random() * Math.PI * 2, rs: (Math.random() - .5) * .1, color: cols[Math.floor(Math.random() * cols.length)] });
                function anim() { cx.clearRect(0, 0, cv.width, cv.height); for (const p of pcs) { p.y += p.vy; p.x += p.vx; p.rot += p.rs; if (p.y > cv.height + 20) { p.y = -20; p.x = Math.random() * cv.width } cx.save(); cx.translate(p.x, p.y); cx.rotate(p.rot); cx.fillStyle = p.color; cx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h); cx.restore() } confRAF = requestAnimationFrame(anim) } anim();
            }

            /* Spark burst helper */
            function burst(el, container) {
                const r = el.getBoundingClientRect(), cr = container.getBoundingClientRect();
                const cx = r.left - cr.left + r.width / 2, cy = r.top - cr.top + r.height / 2;
                const cols = ["#fff176", "#f8bbd0", "#ce93d8", "#90caf9", "#a5d6a7"];
                for (let i = 0; i < 8; i++) { const p = document.createElement("div"); p.className = "spark"; p.style.left = cx + "px"; p.style.top = cy + "px"; p.style.background = cols[i % cols.length]; p.style.setProperty("--dx", (Math.random() - .5) * 100 + "px"); p.style.setProperty("--dy", (Math.random() - .5) * 100 + "px"); container.appendChild(p); setTimeout(() => p.remove(), 800) }
            }

            /* Restart */
            document.getElementById("btn-restart").onclick = () => {
                if (confRAF) cancelAnimationFrame(confRAF); stopFairyAnim(); stopLullaby(); musicEnabled = false;
                document.getElementById("music-btn").textContent = "🎵";
                clearInterval(rSpawner);
                document.querySelectorAll(".scene").forEach(s => { s.classList.remove("active"); s.style.opacity = "0" });
                setTimeout(() => {
                    const w = document.getElementById("scene-intro");
                    introTitle.textContent = "Gözlerini açıyorsun..."; introSub.textContent = "";
                    nameInput.style.display = "none"; charOpts.style.display = "none"; introBtn.style.display = "none";
                    document.querySelectorAll(".char-opt").forEach(o => o.classList.remove("selected"));
                    w.classList.add("active"); requestAnimationFrame(() => w.style.opacity = "1"); curScene = w;
                    w.onclick = function handler() { w.onclick = null; introTitle.textContent = "Maceraya Hoş Geldin! ✨"; introSub.textContent = "Adını yaz ve karakterini seç"; nameInput.style.display = "block"; charOpts.style.display = "flex"; introBtn.style.display = "block"; nameInput.focus() };
                }, 300);
            };

        })();
    </script>
