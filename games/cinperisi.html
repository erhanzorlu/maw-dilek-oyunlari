<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sihirli Lamba</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Amiri:ital,wght@0,400;0,700;1,400&display=swap');
:root{--gold:#F4A829;--dg:#C07B0A;--am:#FF8C00;--night:#070415;--pur:#1A0A3A;--cin:#4A90D9;--smk:rgba(255,240,200,.92);}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Amiri',serif;background:var(--night);overflow:hidden;width:100vw;height:100vh;}
#stars{position:fixed;inset:0;pointer-events:none;z-index:0;}
.star{position:absolute;border-radius:50%;background:#fff;animation:twinkle linear infinite;}
@keyframes twinkle{0%,100%{opacity:.15;transform:scale(1)}50%{opacity:1;transform:scale(1.5)}}
#moon{position:fixed;top:40px;left:60px;z-index:2;font-size:3.5rem;opacity:.55;animation:mfloat 8s ease-in-out infinite;filter:drop-shadow(0 0 20px rgba(255,240,180,.5));}
@keyframes mfloat{0%,100%{transform:translateY(0) rotate(-5deg)}50%{transform:translateY(-12px) rotate(5deg)}}
#mountains{position:fixed;bottom:0;left:0;right:0;z-index:1;pointer-events:none;}
#lamp-scene{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:10;transition:opacity .8s ease;}
.scene-title{font-family:'Cinzel Decorative',cursive;font-size:clamp(1.1rem,3vw,1.9rem);color:var(--gold);text-shadow:0 0 30px rgba(244,168,41,.9),0 0 70px rgba(244,168,41,.4);letter-spacing:3px;animation:tpulse 3s ease-in-out infinite;text-align:center;margin-bottom:8px;}
@keyframes tpulse{0%,100%{text-shadow:0 0 30px rgba(244,168,41,.8),0 0 60px rgba(244,168,41,.3)}50%{text-shadow:0 0 55px rgba(244,168,41,1),0 0 110px rgba(244,168,41,.6)}}
.rub-hint{font-size:clamp(.75rem,1.8vw,1rem);color:rgba(244,168,41,.65);margin-bottom:28px;letter-spacing:1px;animation:fhint 2.5s ease-in-out infinite;text-align:center;}
@keyframes fhint{0%,100%{opacity:.4}50%{opacity:1}}
#lamp-wrap{position:relative;width:280px;height:240px;cursor:grab;touch-action:none;filter:drop-shadow(0 0 35px rgba(244,168,41,.45));transition:filter .3s;}
#lamp-wrap:active{cursor:grabbing;}
#lamp-wrap.rubbing{filter:drop-shadow(0 0 90px rgba(244,168,41,1)) drop-shadow(0 0 40px rgba(255,140,0,.8));animation:lshake .12s ease-in-out infinite;}
@keyframes lshake{0%,100%{transform:rotate(-1.5deg) scale(1.03)}50%{transform:rotate(1.5deg) scale(1.04)}}
#rub-wrap{margin-top:28px;display:flex;flex-direction:column;align-items:center;gap:7px;}
.rub-lbl{font-family:'Cinzel Decorative',cursive;font-size:.7rem;color:var(--gold);letter-spacing:3px;opacity:.8;}
#rub-bg{width:250px;height:16px;background:rgba(255,255,255,.07);border-radius:8px;border:1px solid rgba(244,168,41,.3);overflow:hidden;}
#rub-fill{height:100%;width:0%;background:linear-gradient(90deg,#A06008,#F4A829,#FFD700,#F4A829);border-radius:8px;transition:width .08s;position:relative;overflow:hidden;}
#rub-fill::after{content:'';position:absolute;inset:0 -100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.45),transparent);animation:shine 1s linear infinite;}
@keyframes shine{0%{transform:translateX(0)}100%{transform:translateX(200%)}}
#smoke-wrap{position:absolute;top:-90px;left:50%;transform:translateX(-50%);pointer-events:none;display:none;}
.sp{position:absolute;border-radius:50%;background:radial-gradient(circle,rgba(255,235,160,.85) 0%,rgba(255,150,40,.3) 60%,transparent 100%);animation:smkup 2s ease-out forwards;}
@keyframes smkup{0%{transform:translateY(0) scale(.25);opacity:1}60%{transform:translateY(-90px) scale(1.8) rotate(25deg);opacity:.5}100%{transform:translateY(-170px) scale(3) rotate(-15deg);opacity:0}}
#genie{position:fixed;bottom:-420px;right:4%;width:190px;z-index:20;transition:bottom .9s cubic-bezier(.34,1.56,.64,1);filter:drop-shadow(0 0 25px rgba(90,160,255,.7));}
#genie.up{bottom:10px;}
#q-panel{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);z-index:30;width:min(92vw,580px);background:linear-gradient(145deg,#15082E,#0A0420,#15082E);border:2px solid var(--gold);border-radius:22px;padding:32px 30px;text-align:center;box-shadow:0 0 70px rgba(244,168,41,.25),inset 0 0 50px rgba(244,168,41,.04);transition:transform .5s cubic-bezier(.34,1.56,.64,1);}
#q-panel.open{transform:translate(-50%,-50%) scale(1);}
#q-panel::before{content:'';position:absolute;inset:5px;border:1px solid rgba(244,168,41,.15);border-radius:17px;pointer-events:none;}
.q-orn{font-size:1.8rem;margin-bottom:8px;}
.q-cat{font-family:'Cinzel Decorative',cursive;font-size:.65rem;color:var(--am);letter-spacing:3px;margin-bottom:12px;opacity:.85;}
.qdiv{width:100%;height:1px;background:linear-gradient(90deg,transparent,rgba(244,168,41,.5),transparent);margin:10px 0 18px;}
.q-txt{font-size:clamp(1.05rem,2.5vw,1.45rem);color:var(--smk);line-height:1.65;margin-bottom:22px;font-style:italic;}
#ans-input{width:100%;padding:14px 18px;border-radius:14px;background:rgba(255,255,255,.06);border:1px solid rgba(244,168,41,.35);color:var(--smk);font-family:'Amiri',serif;font-size:1.05rem;outline:none;transition:border-color .25s,box-shadow .25s;resize:none;min-height:90px;caret-color:var(--gold);margin-bottom:16px;display:block;}
#ans-input:focus{border-color:var(--gold);box-shadow:0 0 20px rgba(244,168,41,.2);}
#ans-input::placeholder{color:rgba(244,168,41,.4);font-style:italic;}
.send-btn{background:linear-gradient(135deg,var(--dg),var(--gold));border:none;border-radius:50px;padding:11px 36px;color:var(--night);font-family:'Cinzel Decorative',cursive;font-size:.8rem;font-weight:700;cursor:pointer;letter-spacing:1px;transition:all .3s;box-shadow:0 4px 22px rgba(244,168,41,.4);}
.send-btn:hover{transform:translateY(-3px);box-shadow:0 8px 30px rgba(244,168,41,.6);}
.send-btn:disabled{opacity:.5;cursor:not-allowed;transform:none;}
#genie-bubble{margin-top:16px;padding:16px 20px;border-radius:16px;background:rgba(74,144,217,.1);border:1px solid rgba(74,144,217,.35);color:rgba(180,220,255,.95);font-size:clamp(.9rem,2vw,1.05rem);line-height:1.7;text-align:left;min-height:60px;display:none;position:relative;overflow:hidden;}
#genie-bubble::before{content:'🧞';position:absolute;top:-14px;left:12px;font-size:1.4rem;background:var(--night);padding:2px 4px;border-radius:50%;}
.dots{display:inline-flex;gap:5px;align-items:center;padding:6px 0;}
.dots span{width:8px;height:8px;border-radius:50%;background:rgba(74,144,217,.8);animation:dot 1.2s ease-in-out infinite;}
.dots span:nth-child(2){animation-delay:.2s}.dots span:nth-child(3){animation-delay:.4s}
@keyframes dot{0%,80%,100%{transform:scale(.6);opacity:.4}40%{transform:scale(1);opacity:1}}
.next-btn{margin-top:14px;background:transparent;border:1px solid rgba(244,168,41,.5);border-radius:50px;padding:9px 30px;color:var(--gold);font-family:'Cinzel Decorative',cursive;font-size:.72rem;cursor:pointer;letter-spacing:1px;transition:all .3s;display:none;}
.next-btn:hover{background:rgba(244,168,41,.1);transform:translateY(-2px);}
.q-count{font-family:'Cinzel Decorative',cursive;font-size:.65rem;color:rgba(244,168,41,.5);margin-top:12px;letter-spacing:2px;}
#carpet-btn{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(120px);z-index:25;background:linear-gradient(135deg,#6B1010,#3A0505);border:2px solid #DAA520;border-radius:50px;padding:13px 32px;color:#DAA520;font-family:'Cinzel Decorative',cursive;font-size:.85rem;cursor:pointer;letter-spacing:1px;transition:all .6s cubic-bezier(.34,1.56,.64,1);box-shadow:0 4px 30px rgba(107,16,16,.6);display:flex;align-items:center;gap:10px;}
#carpet-btn.show{transform:translateX(-50%) translateY(0);}
#carpet-btn:hover{transform:translateX(-50%) translateY(-5px);box-shadow:0 12px 40px rgba(218,165,32,.4);}
#badge{position:fixed;top:18px;right:18px;z-index:15;background:rgba(7,4,21,.85);border:1px solid rgba(244,168,41,.4);border-radius:50px;padding:7px 18px;font-family:'Cinzel Decorative',cursive;font-size:.7rem;color:var(--gold);letter-spacing:1px;backdrop-filter:blur(10px);}
#flight-scene{position:fixed;inset:0;z-index:50;opacity:0;pointer-events:none;transition:opacity .8s;overflow:hidden;background:linear-gradient(180deg,#020810 0%,#040D24 40%,#081840 100%);}
#flight-scene.on{opacity:1;pointer-events:all;}
#flying-carpet{position:absolute;bottom:28%;left:-320px;width:270px;filter:drop-shadow(0 20px 40px rgba(0,0,0,.9));animation:flyAcross 4.2s ease-in-out forwards;}
@keyframes flyAcross{0%{left:-320px;transform:rotate(-3deg)}25%{transform:rotate(3deg) translateY(-18px)}50%{transform:rotate(-2deg) translateY(12px)}75%{transform:rotate(2deg) translateY(-12px)}85%,100%{left:58%;transform:rotate(0deg)}}
#fly-pass{position:absolute;bottom:35%;left:-300px;width:75px;animation:flyPass 4.2s ease-in-out forwards;filter:drop-shadow(0 4px 12px rgba(0,0,0,.7));}
@keyframes flyPass{0%{left:-300px}85%,100%{left:70%}}
.sspeed{position:absolute;width:2px;background:#fff;border-radius:1px;animation:spLine linear infinite;}
@keyframes spLine{0%{transform:scaleX(1);opacity:.9}100%{transform:scaleX(60);opacity:0;left:-20%}}
#dest-panel{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;opacity:0;transition:opacity .6s ease 4s;}
#dest-panel.show{opacity:1;}
.dest-title{font-family:'Cinzel Decorative',cursive;font-size:clamp(1rem,3vw,1.7rem);color:var(--gold);margin-bottom:28px;text-shadow:0 0 40px rgba(244,168,41,.9);}
.dest-grid{display:flex;gap:16px;flex-wrap:wrap;justify-content:center;}
.dest-card{background:rgba(255,255,255,.05);border:1px solid rgba(244,168,41,.4);border-radius:16px;padding:18px 22px;cursor:pointer;transition:all .3s;width:130px;text-align:center;}
.dest-card:hover{border-color:var(--gold);background:rgba(244,168,41,.1);transform:translateY(-8px) scale(1.06);box-shadow:0 15px 35px rgba(244,168,41,.25);}
.dest-ico{font-size:2.2rem;margin-bottom:6px;display:block;}
.dest-nm{font-family:'Cinzel Decorative',cursive;font-size:.62rem;color:var(--gold);letter-spacing:1px;}
#dest-scene{position:fixed;inset:0;z-index:60;opacity:0;pointer-events:none;transition:opacity .9s;display:flex;align-items:center;justify-content:center;}
#dest-scene.on{opacity:1;pointer-events:all;}
#dest-bg{position:absolute;inset:0;}
.dest-cnt{position:relative;z-index:2;text-align:center;padding:20px;max-width:560px;}
.dest-big{font-size:clamp(3.5rem,12vw,7rem);animation:dfloat 3s ease-in-out infinite;margin-bottom:14px;display:block;}
@keyframes dfloat{0%,100%{transform:translateY(0) rotate(-3deg)}50%{transform:translateY(-14px) rotate(3deg)}}
.dest-head{font-family:'Cinzel Decorative',cursive;font-size:clamp(1.3rem,4vw,2.4rem);color:var(--gold);text-shadow:0 0 50px rgba(244,168,41,.9);margin-bottom:16px;animation:dapp 1s ease .4s both;}
.dest-desc{font-size:clamp(.9rem,2vw,1.15rem);color:rgba(255,240,200,.88);line-height:1.75;margin-bottom:28px;animation:dapp 1s ease .7s both;}
@keyframes dapp{0%{transform:translateY(28px);opacity:0}100%{transform:translateY(0);opacity:1}}
.back-btn{background:rgba(244,168,41,.12);border:1px solid var(--gold);border-radius:50px;padding:11px 32px;color:var(--gold);font-family:'Cinzel Decorative',cursive;font-size:.75rem;cursor:pointer;letter-spacing:1px;transition:all .3s;animation:dapp 1s ease .9s both;}
.back-btn:hover{background:rgba(244,168,41,.22);transform:translateY(-3px);}
#ov{position:fixed;inset:0;background:#000;z-index:200;opacity:0;pointer-events:none;transition:opacity .55s;}
#ov.on{opacity:1;pointer-events:all;}
</style>
</head>

  <div class="q-txt" id="q-txt">Soru yükleniyor...</div>

  <button class="send-btn" id="send-btn" onclick="sendAnswer()">✦ Cine Gönder</button>
  <div id="genie-bubble">
    <div class="dots"><span></span><span></span><span></span></div>
  </div>
  <button class="next-btn" id="next-btn" onclick="nextQ()">Sonraki Soru ✦</button>

  <div id="speed-stars"></div>
  <div style="position:absolute;top:12%;right:12%;font-size:4.5rem;opacity:.65;animation:dfloat 5s ease-in-out infinite">🌙</div>

    <line x1="4" y1="24" x2="1" y2="52" stroke="#DAA520" stroke-width="2"/><line x1="266" y1="24" x2="269" y2="52" stroke="#DAA520" stroke-width="2"/>

    <circle cx="37" cy="11" r="4.5" fill="#DAA520"/>
    <circle cx="30" cy="36" r="4.5" fill="white"/><circle cx="44" cy="36" r="4.5" fill="white"/>

  <div id="dest-panel">
    <div class="dest-title">✦ Nereye Gitmek İstersin? ✦</div>
    <div class="dest-grid" id="dest-grid"></div>

</div>

<div id="dest-scene">
  <div id="dest-bg"></div>
  <div class="dest-cnt">
    <span class="dest-big" id="dest-big">🏛️</span>
    <div class="dest-head" id="dest-head">Başlık</div>
    <div class="dest-desc" id="dest-desc">Açıklama</div>
    <button class="back-btn" onclick="goBack()">↩ Lambaya Dön</button>
  </div>
</div>

<style>
@keyframes dfloat{0%,100%{transform:translateY(0) rotate(-3deg)}50%{transform:translateY(-14px) rotate(3deg)}}
</style>

<script>
const questions=[
  {cat:"🎮 Oyun & Eğlence",q:"Serbest zamanlarında en çok hangi oyunları oynarsın? Dijital mi, masa oyunu mu, başka bir şey mi? Biraz anlat!"},
  {cat:"💫 Hobiler",q:"Hayatında en çok zevk aldığın hobi nedir? Bu hobi sana ne hissettiriyor?"},
  {cat:"🍕 Yemek & Lezzet",q:"Sonsuza dek sadece bir yemek yemek zorunda olsaydın ne seçerdin? Neden o yemek seni bu kadar çekiyor?"},
  {cat:"🌍 Seyahat & Macera",q:"Henüz gidemediğin ama çok gitmek istediğin bir yer var mı? O yer seni neden çekiyor?"},
  {cat:"📺 Dizi & Film",q:"Son zamanlarda izlediğin en etkileyici ya da en sevdiğin yapım hangisiydi? Neden öyle hissettirdi?"},
  {cat:"🎵 Müzik & Ritim",q:"Müzik hayatında ne kadar yer tutuyor? En çok hangi müzik türünü ya da sanatçıyı dinlersin?"},
  {cat:"🦸 Süper Güç",q:"Gerçekten bir süper güce sahip olabilseydin hangisini seçerdin ve onu nasıl kullanırdın?"},
  {cat:"🌟 Hayaller",q:"Beş yıl sonra kendini nerede hayal ediyorsun? En büyük hayalin nedir?"},
];

const destinations=[
  {i:"🏛️",n:"Antik Atina",bg:"linear-gradient(180deg,#6B9EC4,#9ABCD0 35%,#C8B89A 65%,#D2A67A)",d:"Felsefenin doğduğu, demokrasinin filizlendiği kadim şehir. Sokrates'in adımladığı taşlar hâlâ burada, Parthenon bulutlara meydan okuyor."},
  {i:"🐫",n:"Çöl Sarayı",bg:"linear-gradient(180deg,#D45000,#F48020 30%,#FFD060 65%,#C8900A)",d:"Sonsuz altın kumlar ortasında yükselen gizemli bir saray. Deve kervanları uzaktan yaklaşıyor, baharat kokuları seni kucaklıyor."},
  {i:"🌊",n:"Denizaltı Krallığı",bg:"linear-gradient(180deg,#000C1A,#002848 30%,#004878 60%,#0068A0)",d:"Okyanus derinliklerinde parlayan sihirli bir dünya. Mercan sarayları, ışıldayan yaratıklar ve su perilerinin ezgisi seni karşılıyor."},
  {i:"☁️",n:"Bulut Kalesi",bg:"linear-gradient(180deg,#4A90D9,#87CEEB 35%,#C8E8F5 65%,#EEF6FF)",d:"Pamuk bulutların üzerinde süzülen beyaz bir kale. Rüzgar türkü söylüyor, ufukta gökkuşakları dans ediyor."},
  {i:"🔮",n:"Sihir Akademisi",bg:"linear-gradient(180deg,#0A0420,#180838 35%,#2A1060 65%,#3A1880)",d:"Büyücülerin ders gördüğü kadim bir okul. Kitaplar uçuyor, kazanlar kaynıyor, her koridorda yeni bir sır seni bekliyor."},
  {i:"🌺",n:"Sonsuz Bahçe",bg:"linear-gradient(180deg,#87CEEB,#68C468 35%,#2E8B2E 70%,#1A5A1A)",d:"Her çiçeğin konuştuğu, kelebeklerin dans ettiği, kristal derelerin aktığı sonsuz bir cennet bahçesi."},
];

let rubP=0,mDown=false,lx=0,ly=0;
let qIdx=0,answered=0,genieOut=false,shuffledQ=[];

(function(){
  const c=document.getElementById('stars');
  for(let i=0;i<200;i++){
    const s=document.createElement('div');s.className='star';
    const sz=Math.random()*2.8+.4;
    s.style.cssText=`width:${sz}px;height:${sz}px;top:${Math.random()*100}%;left:${Math.random()*100}%;animation-duration:${2+Math.random()*5}s;animation-delay:${Math.random()*5}s`;
    c.appendChild(s);
  }
})();

const lw=document.getElementById('lamp-wrap'),rf=document.getElementById('rub-fill');

function move(x,y){
  if(!mDown)return;
  const dx=x-lx,dy=y-ly,d=Math.sqrt(dx*dx+dy*dy);
  lx=x;ly=y;
  if(d>2){
    rubP=Math.min(100,rubP+d*.95);rf.style.width=rubP+'%';
    lw.classList.add('rubbing');spawnSmoke();
    clearTimeout(window._rst);window._rst=setTimeout(()=>lw.classList.remove('rubbing'),180);
    if(rubP>=100){mDown=false;lw.classList.remove('rubbing');summonGenie();}
  }
}
lw.addEventListener('mousedown',e=>{mDown=true;lx=e.clientX;ly=e.clientY;});
document.addEventListener('mousemove',e=>move(e.clientX,e.clientY));
document.addEventListener('mouseup',()=>{mDown=false;lw.classList.remove('rubbing');});
lw.addEventListener('touchstart',e=>{e.preventDefault();mDown=true;lx=e.touches[0].clientX;ly=e.touches[0].clientY;},{passive:false});
lw.addEventListener('touchmove',e=>{e.preventDefault();move(e.touches[0].clientX,e.touches[0].clientY);},{passive:false});
lw.addEventListener('touchend',()=>{mDown=false;lw.classList.remove('rubbing');});
setInterval(()=>{if(!mDown&&rubP>0){rubP=Math.max(0,rubP-1.8);rf.style.width=rubP+'%';}},50);

function spawnSmoke(){
  const sw=document.getElementById('smoke-wrap');sw.style.display='block';
  const p=document.createElement('div');p.className='sp';
  const sz=18+Math.random()*28;
  p.style.cssText=`width:${sz}px;height:${sz}px;left:${38+Math.random()*22}px;top:${Math.random()*8}px`;
  sw.appendChild(p);setTimeout(()=>p.remove(),2000);
}

function summonGenie(){
  if(genieOut)return;genieOut=true;
  for(let i=0;i<18;i++)setTimeout(spawnSmoke,i*70);
  setTimeout(()=>{
    document.getElementById('genie').classList.add('up');
    setTimeout(showFirstQ,900);
  },500);
}

function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}

function showFirstQ(){
  shuffledQ=shuffle(questions);qIdx=0;answered=0;
  document.getElementById('qt').textContent=shuffledQ.length;
  renderQ();document.getElementById('q-panel').classList.add('open');
}

function renderQ(){
  const q=shuffledQ[qIdx];
  document.getElementById('q-cat').textContent=q.cat;
  document.getElementById('q-txt').textContent=q.q;
  const inp=document.getElementById('ans-input');inp.value='';inp.disabled=false;
  const sb=document.getElementById('send-btn');sb.disabled=false;sb.style.display='inline-block';
  const gb=document.getElementById('genie-bubble');
  gb.style.display='none';gb.innerHTML='<div class="dots"><span></span><span></span><span></span></div>';
  document.getElementById('next-btn').style.display='none';
  document.getElementById('qi').textContent=qIdx+1;
}

async function sendAnswer(){
  const inp=document.getElementById('ans-input');
  const val=inp.value.trim();
  if(!val){inp.style.boxShadow='0 0 0 2px rgba(255,80,80,.5)';setTimeout(()=>inp.style.boxShadow='',800);return;}
  inp.disabled=true;
  const sb=document.getElementById('send-btn');sb.disabled=true;
  const gb=document.getElementById('genie-bubble');
  gb.style.display='block';
  gb.innerHTML='<div class="dots"><span></span><span></span><span></span></div>';
  const q=shuffledQ[qIdx];
  try{
    const res=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        model:"claude-sonnet-4-20250514",
        max_tokens:200,
        system:"Sen Bin Bir Gece Masalları'ndan çıkmış bilge ve neşeli bir cinsin. Kullanıcının kişisel bir soruya verdiği cevabı okuyup ona özel, sıcak, eğlenceli ve biraz büyülü 2-3 cümlelik bir yorum yap. Türkçe yaz. Resmi olma, samimi ve renkli ol. Her cevabın başında farklı bir emoji koy.",
        messages:[{role:"user",content:`Soru: "${q.q}"\nKullanıcı cevabı: "${val}"\nBu cevaba özel bir yorum yap.`}]
      })
    });
    const data=await res.json();
    const text=data.content?.[0]?.text||"✨ Ne büyüleyici bir cevap! Kaderinizde muhteşem şeyler var...";
    typeText(gb,text);
  }catch(e){
    typeText(gb,"✨ Harika bir cevap! Ruhunuzun derinliklerini hissedebiliyorum, önünüzde büyük şeyler var...");
  }
  answered++;
  document.getElementById('sv').textContent=answered;
  document.getElementById('next-btn').style.display='inline-block';
  if(answered>=3)document.getElementById('carpet-btn').classList.add('show');
}

function typeText(el,text){
  el.textContent='';let i=0;
  const iv=setInterval(()=>{el.textContent+=text[i];i++;if(i>=text.length)clearInterval(iv);},25);
}

function nextQ(){qIdx=(qIdx+1)%shuffledQ.length;renderQ();}

document.getElementById('ans-input').addEventListener('keydown',e=>{
  if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendAnswer();}
});

function startFlight(){
  fade(()=>{
    const ls=document.getElementById('lamp-scene');ls.style.opacity='0';ls.style.pointerEvents='none';
    document.getElementById('q-panel').classList.remove('open');
    document.getElementById('genie').style.display='none';
    document.getElementById('carpet-btn').style.display='none';
    document.getElementById('flight-scene').classList.add('on');
    createSpeedStars();buildDests();
    setTimeout(()=>document.getElementById('dest-panel').classList.add('show'),4200);
  });
}

function createSpeedStars(){
  const c=document.getElementById('speed-stars');
  for(let i=0;i<70;i++){
    const s=document.createElement('div');s.className='sspeed';
    const h=1+Math.random()*2;
    s.style.cssText=`top:${Math.random()*100}%;right:${Math.random()*100}%;height:${h}px;animation-duration:${.35+Math.random()*.5}s;animation-delay:${Math.random()}s`;
    c.appendChild(s);
  }
}

function buildDests(){
  const g=document.getElementById('dest-grid');g.innerHTML='';
  destinations.forEach((d,i)=>{
    const c=document.createElement('div');c.className='dest-card';
    c.innerHTML=`<span class="dest-ico">${d.i}</span><div class="dest-nm">${d.n}</div>`;
    c.onclick=()=>goTo(i);g.appendChild(c);
  });
}

function goTo(i){
  const d=destinations[i];
  fade(()=>{
    document.getElementById('flight-scene').classList.remove('on');
    document.getElementById('dest-bg').style.background=d.bg;
    document.getElementById('dest-big').textContent=d.i;
    document.getElementById('dest-head').textContent=d.n+"'e Hoş Geldin!";
    document.getElementById('dest-desc').textContent=d.d;
    document.getElementById('dest-scene').classList.add('on');
  });
}

function goBack(){
  fade(()=>{
    document.getElementById('dest-scene').classList.remove('on');
    const ls=document.getElementById('lamp-scene');ls.style.opacity='1';ls.style.pointerEvents='all';
    document.getElementById('genie').style.display='block';
    const cb=document.getElementById('carpet-btn');cb.style.display='flex';cb.classList.add('show');
    document.getElementById('q-panel').classList.add('open');
    const fc=document.getElementById('flying-carpet'),fp=document.getElementById('fly-pass');
    fc.style.animation='none';fp.style.animation='none';
    setTimeout(()=>{fc.style.animation='';fp.style.animation='';},30);
    document.getElementById('dest-panel').classList.remove('show');
  });
}

function fade(cb){
  const ov=document.getElementById('ov');ov.classList.add('on');
  setTimeout(()=>{cb();setTimeout(()=>ov.classList.remove('on'),100);},560);
}
</script>
</body>
</html>
