<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WishHub Wrapped 2025</title>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --yellow: #FFE566;
  --pink:   #f472b6;
  --white:  #ffffff;
}

body, html {
  height: 100%;
  background: #000;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  user-select: none;
  touch-action: manipulation;
}

/* ── PHONE SHELL ── */
#phone {
  position: relative;
  width: min(390px, 100vw);
  height: min(844px, 100dvh);
  overflow: hidden;
  border-radius: clamp(0px, 9999px, 44px);
  box-shadow: 0 0 0 1px rgba(255,255,255,0.07),
              0 40px 100px rgba(0,0,0,0.9);
}

/* ── CANVAS BG ── */
#bg-canvas {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  z-index: 0;
  transition: opacity 0.6s;
}

/* ── NOISE OVERLAY ── */
#phone::after {
  content: '';
  position: absolute;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.045'/%3E%3C/svg%3E");
  z-index: 1;
  pointer-events: none;
  opacity: 0.5;
}

/* ── PROGRESS ── */
#prog-wrap {
  position: absolute;
  top: 0; left: 0; right: 0;
  z-index: 100;
  padding: 18px 18px 0;
  display: flex;
  gap: 5px;
}
.seg {
  flex: 1;
  height: 2.5px;
  background: rgba(255,255,255,0.18);
  border-radius: 9999px;
  overflow: hidden;
}
.seg-fill {
  height: 100%;
  background: rgba(255,255,255,0.8);
  border-radius: 9999px;
  width: 0%;
}
.seg-fill.instant { transition: none; width: 100%; }
.seg-fill.timed   { transition: width 7s linear; width: 100%; }

/* ── WORDMARK ── */
#wordmark {
  position: absolute;
  top: 38px; left: 28px;
  z-index: 100;
  font-family: 'Syne', sans-serif;
  font-size: 11px;
  font-weight: 700;
  color: rgba(255,255,255,0.22);
  letter-spacing: 0.2em;
  text-transform: uppercase;
  pointer-events: none;
}

/* ── SLIDE ── */
.slide {
  position: absolute;
  inset: 0;
  z-index: 10;
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 0;
  pointer-events: none;
  opacity: 0;
}
.slide.in-right { animation: inR 0.55s cubic-bezier(0.22,1,0.36,1) forwards; }
.slide.in-left  { animation: inL 0.55s cubic-bezier(0.22,1,0.36,1) forwards; }
.slide.out-left { animation: outL 0.4s cubic-bezier(0.55,0,1,0.45) forwards; }
.slide.out-right{ animation: outR 0.4s cubic-bezier(0.55,0,1,0.45) forwards; }
.slide.visible  { opacity: 1; }

@keyframes inR   { from{opacity:0;transform:translateX(50px) scale(0.95)} to{opacity:1;transform:none} }
@keyframes inL   { from{opacity:0;transform:translateX(-50px) scale(0.95)} to{opacity:1;transform:none} }
@keyframes outL  { from{opacity:1;transform:none} to{opacity:0;transform:translateX(-50px) scale(0.95)} }
@keyframes outR  { from{opacity:1;transform:none} to{opacity:0;transform:translateX(50px) scale(0.95)} }

/* ── CONTENT BOX ── */
.box {
  padding: 0 32px;
  position: relative;
  z-index: 2;
}

/* ── READABLE OVERLAY (slide 3 fire bg) ── */
.box-readable {
  padding: 28px 32px;
  position: relative;
  z-index: 2;
  background: linear-gradient(180deg, rgba(0,0,0,0) 0%, rgba(0,0,0,0.55) 20%, rgba(0,0,0,0.72) 100%);
  border-radius: 24px;
  margin: 0 12px;
  backdrop-filter: blur(2px);
}

/* ── TYPE ── */
.overline {
  font-family: 'DM Sans', sans-serif;
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.38);
  margin-bottom: 14px;
  display: block;
}
h1 {
  font-family: 'Syne', sans-serif;
  font-size: clamp(30px,8.5vw,40px);
  font-weight: 800;
  line-height: 1.08;
  color: #fff;
  letter-spacing: -0.025em;
  margin-bottom: 14px;
}
h1 em { font-style: normal; color: var(--yellow); }
.body {
  font-family: 'DM Sans', sans-serif;
  font-size: 15px;
  line-height: 1.62;
  color: rgba(255,255,255,0.72);
  font-weight: 300;
}
.body strong { color: rgba(255,255,255,0.85); font-weight: 500; }
.divider {
  width: 36px; height: 2px;
  background: var(--yellow);
  border-radius: 2px;
  margin: 18px 0;
}

/* ── BIG COUNTER ── */
.counter-wrap {
  margin: 4px 0 6px;
  line-height: 1;
}
.counter-num {
  font-family: 'Syne', sans-serif;
  font-size: clamp(78px,21vw,100px);
  font-weight: 800;
  color: var(--yellow);
  letter-spacing: -0.03em;
  display: inline-block;
}
.counter-unit {
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  font-weight: 400;
  color: rgba(255,255,255,0.35);
  letter-spacing: 0.12em;
  text-transform: uppercase;
  display: block;
  margin-top: 2px;
}

/* ── INFOGRAPHIC: SPLIT BARS ── */
.infograph {
  margin: 20px 0 16px;
  display: flex;
  flex-direction: column;
  gap: 14px;
}
.inf-row {
  display: flex;
  align-items: center;
  gap: 12px;
}
.inf-label {
  font-family: 'DM Sans', sans-serif;
  font-size: 11px;
  font-weight: 500;
  color: rgba(255,255,255,0.4);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  width: 70px;
  flex-shrink: 0;
}
.inf-bar-bg {
  flex: 1;
  height: 8px;
  background: rgba(255,255,255,0.08);
  border-radius: 9999px;
  overflow: hidden;
}
.inf-bar-fill {
  height: 100%;
  border-radius: 9999px;
  width: 0%;
  transition: width 1.2s cubic-bezier(0.22,1,0.36,1);
}
.inf-bar-fill.online   { background: linear-gradient(90deg, #34d399, #10b981); }
.inf-bar-fill.physical { background: linear-gradient(90deg, #60a5fa, #3b82f6); }
.inf-val {
  font-family: 'Syne', sans-serif;
  font-size: 16px;
  font-weight: 700;
  color: #fff;
  width: 28px;
  text-align: right;
  flex-shrink: 0;
}

/* ── CALLS STAT ROW ── */
.stat-pair {
  display: flex;
  gap: 10px;
  margin: 18px 0 14px;
}
.stat-card {
  flex: 1;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.09);
  border-radius: 16px;
  padding: 14px 16px;
  backdrop-filter: blur(10px);
}
.stat-card-label {
  font-family: 'DM Sans', sans-serif;
  font-size: 9px;
  font-weight: 500;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.3);
  margin-bottom: 6px;
  display: block;
}
.stat-card-val {
  font-family: 'Syne', sans-serif;
  font-size: 28px;
  font-weight: 800;
  color: var(--yellow);
  letter-spacing: -0.02em;
  line-height: 1;
}

/* ── HOSPITAL ── */
.hospital-pill {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  background: rgba(255,230,102,0.1);
  border: 1px solid rgba(255,230,102,0.25);
  border-radius: 14px;
  padding: 12px 18px;
  margin-top: 14px;
}
.hospital-icon { font-size: 20px; }
.hospital-name {
  font-family: 'Syne', sans-serif;
  font-size: 16px;
  font-weight: 700;
  color: var(--yellow);
  line-height: 1.25;
}

/* ── OUTRO ── */
.outro-ring {
  position: absolute;
  border-radius: 50%;
  border: 1px solid rgba(255,255,255,0.06);
  pointer-events: none;
}
.heart-icon {
  font-size: 52px;
  margin-bottom: 18px;
  display: block;
  animation: heartbeat 1.6s ease-in-out infinite;
}
@keyframes heartbeat {
  0%,100% { transform: scale(1); }
  15%      { transform: scale(1.18); }
  30%      { transform: scale(1); }
  45%      { transform: scale(1.12); }
}
.cta-stack {
  display: flex;
  flex-direction: column;
  gap: 10px;
  margin-top: 28px;
}
.share-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  background: var(--yellow);
  color: #0a0a0a;
  padding: 15px 28px;
  border-radius: 14px;
  font-family: 'Syne', sans-serif;
  font-size: 15px;
  font-weight: 700;
  border: none;
  cursor: pointer;
  letter-spacing: 0.01em;
  transition: transform 0.15s, box-shadow 0.15s;
  position: relative; z-index: 20;
}
.share-btn:active { transform: scale(0.97); }
.replay-btn {
  font-family: 'DM Sans', sans-serif;
  font-size: 11px;
  color: rgba(255,255,255,0.25);
  text-align: center;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  cursor: pointer;
  position: relative; z-index: 20;
  transition: color 0.2s;
}
.replay-btn:hover { color: rgba(255,255,255,0.5); }

/* ── TAP ZONES ── */
.zone {
  position: absolute;
  top: 0; bottom: 0;
  z-index: 50;
  cursor: pointer;
}
#zl { left: 0;  width: 33%; }
#zr { right: 0; width: 67%; }

/* ── BADGE ── */
.badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: rgba(255,230,102,0.1);
  border: 1px solid rgba(255,230,102,0.2);
  border-radius: 9999px;
  padding: 5px 13px;
  font-family: 'DM Sans', sans-serif;
  font-size: 10px;
  font-weight: 500;
  color: var(--yellow);
  letter-spacing: 0.14em;
  text-transform: uppercase;
  margin-bottom: 22px;
}
.badge-dot {
  width: 5px; height: 5px;
  border-radius: 50%;
  background: var(--yellow);
  animation: blink 2s ease infinite;
}
@keyframes blink { 0%,100%{opacity:1}50%{opacity:0.3} }
.hint {
  font-family: 'DM Sans', sans-serif;
  font-size: 10px;
  color: rgba(255,255,255,0.18);
  letter-spacing: 0.1em;
  margin-top: 28px;
  display: block;
}

/* ── STAGGER CHILDREN ── */
.stagger > * {
  opacity: 0;
  transform: translateY(18px);
  animation: staggerIn 0.55s cubic-bezier(0.22,1,0.36,1) forwards;
}
.stagger > *:nth-child(1) { animation-delay: 0.1s; }
.stagger > *:nth-child(2) { animation-delay: 0.2s; }
.stagger > *:nth-child(3) { animation-delay: 0.3s; }
.stagger > *:nth-child(4) { animation-delay: 0.4s; }
.stagger > *:nth-child(5) { animation-delay: 0.5s; }
.stagger > *:nth-child(6) { animation-delay: 0.6s; }
@keyframes staggerIn {
  to { opacity:1; transform:none; }
}

@keyframes thanksBg {
  from { opacity: 0; transform: scale(0.7) translateY(20px); letter-spacing: 0.1em; }
  to   { opacity: 1; transform: scale(1) translateY(0);      letter-spacing: -0.02em; }
}

@keyframes pulseRing {
  0%   { width: 120px; height: 120px; opacity: 0.9; }
  80%  { width: 420px; height: 420px; opacity: 0; }
  100% { width: 420px; height: 420px; opacity: 0; }
}

@keyframes watermarkIn {
  from { opacity: 0; transform: scale(0.8); }
  to   { opacity: 1; transform: scale(1); }
}
</style>
</head>
<body>

<div id="phone">
  <canvas id="bg-canvas"></canvas>
  <div id="prog-wrap"></div>
  <div id="wordmark">Make a Wish</div>
  <div id="stage"></div>
  <div class="zone" id="zl" onclick="nav(-1)"></div>
  <div class="zone" id="zr" onclick="nav(+1)"></div>
</div>

<script>
/* ═══════════════════════════════════
   DATA
═══════════════════════════════════ */
const D = {
  name: "Erhan",
  totalWishes: 42,
  onlineWishes: 18,
  physicalWishes: 24,
  totalCalls: 156,
  totalChars: 53040,
  topHospital: "Hacettepe Çocuk Hastanesi",
  wishFulfillments: 12
};

/* ═══════════════════════════════════
   ANIMATED CANVAS BACKGROUNDS
   Each slide has its own particle world
═══════════════════════════════════ */
const BG_THEMES = [
  // 0 — Intro: drifting purple/pink orbs
  { base: '#0d0010', particles: () => genOrbs(['#6d28d9','#be185d','#4c1d95'], 18, 0.15) },
  // 1 — Wishes: emerald constellation
  { base: '#001828', particles: () => genWave(['#0ea5e9','#06b6d4','#38bdf8','#0284c7'], 60, 0.3) },
  // 2 — Online/Physical: fiery sparks
  { base: '#180400', particles: () => genFire(['#ef4444','#f97316','#fb923c','#fde68a'], 70, 0.5) },
  // 3 — Wish fulfillment: warm purple gold
  { base: '#0e0016', particles: () => genStars(['#FFE566','#c084fc','#a78bfa','#fde68a'], 50, 0.35) },
  // 4 — Hospital: crimson embers
  { base: '#150000', particles: () => genOrbs(['#ef4444','#b91c1c','#fca5a5'], 20, 0.2) },
  // 5 — Outro: gold shimmer
  { base: '#0a0608', particles: () => genStars(['#FFE566','#f472b6','#a78bfa'], 55, 0.5) },
];

/* Particle generators */
function genOrbs(colors, count, speed) {
  return Array.from({length:count}, () => ({
    x: Math.random(), y: Math.random(),
    r: 60 + Math.random()*120,
    vx: (Math.random()-0.5)*speed*0.3,
    vy: (Math.random()-0.5)*speed*0.3,
    color: colors[Math.floor(Math.random()*colors.length)],
    a: 0.15+Math.random()*0.2,
    type:'orb'
  }));
}
function genStars(colors, count, speed) {
  return Array.from({length:count}, () => ({
    x: Math.random(), y: Math.random(),
    r: 1+Math.random()*2.5,
    vx: (Math.random()-0.5)*speed*0.15,
    vy: (Math.random()-0.5)*speed*0.15,
    color: colors[Math.floor(Math.random()*colors.length)],
    a: 0.4+Math.random()*0.6,
    twinkle: Math.random()*Math.PI*2,
    type:'star'
  }));
}
function genSparks(colors, count, speed) {
  return Array.from({length:count}, () => ({
    x: Math.random(), y: 0.8+Math.random()*0.3,
    r: 1.5+Math.random()*3,
    vx: (Math.random()-0.5)*speed*0.5,
    vy: -speed*0.4 - Math.random()*speed*0.6,
    color: colors[Math.floor(Math.random()*colors.length)],
    a: 0.5+Math.random()*0.5,
    life: 1, decay: 0.008+Math.random()*0.006,
    type:'spark'
  }));
}
function genAurora(colors, count, speed) {
  return Array.from({length:count}, () => ({
    x: Math.random(), y: Math.random()*0.6,
    r: 80+Math.random()*150,
    vx: (Math.random()-0.5)*speed*0.1,
    vy: (Math.random()-0.5)*speed*0.05,
    color: colors[Math.floor(Math.random()*colors.length)],
    a: 0.08+Math.random()*0.12,
    type:'orb'
  }));
}

function genWave(colors, count, speed) {
  return Array.from({length:count}, () => ({
    x: Math.random(), y: Math.random(),
    r: 1.5+Math.random()*4,
    vx: (speed * 0.12) + Math.random()*speed*0.08,
    vy: (Math.random()-0.5)*speed*0.06,
    color: colors[Math.floor(Math.random()*colors.length)],
    a: 0.3+Math.random()*0.6,
    twinkle: Math.random()*Math.PI*2,
    waveOffset: Math.random()*Math.PI*2,
    waveAmp: 0.02+Math.random()*0.04,
    waveFreq: 0.5+Math.random()*1.5,
    type:'wave'
  }));
}
function genFire(colors, count, speed) {
  return Array.from({length:count}, () => ({
    x: Math.random(),
    y: 0.6+Math.random()*0.5,
    r: 2+Math.random()*5,
    vx: (Math.random()-0.5)*speed*0.4,
    vy: -(speed*0.3 + Math.random()*speed*0.7),
    color: colors[Math.floor(Math.random()*colors.length)],
    a: 0.6+Math.random()*0.4,
    life: Math.random(), decay: 0.005+Math.random()*0.009,
    wobble: Math.random()*Math.PI*2,
    type:'fire'
  }));
}

/* Canvas renderer */
const canvas = document.getElementById('bg-canvas');
const ctx2 = canvas.getContext('2d');
let W, H, particles = [], currentTheme = 0, targetTheme = 0;
let bgBlend = 1; // 0→1 transition
let oldBase = BG_THEMES[0].base, newBase = BG_THEMES[0].base;

function resizeCanvas() {
  W = canvas.width  = canvas.offsetWidth;
  H = canvas.height = canvas.offsetHeight;
}

function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return {r,g,b};
}

function lerpColor(a, b, t) {
  const ca = hexToRgb(a), cb = hexToRgb(b);
  const r = Math.round(ca.r + (cb.r-ca.r)*t);
  const g = Math.round(ca.g + (cb.g-ca.g)*t);
  const bl= Math.round(ca.b + (cb.b-ca.b)*t);
  return `rgb(${r},${g},${bl})`;
}

function switchTheme(idx) {
  oldBase = lerpColor(oldBase, newBase, bgBlend);
  newBase = BG_THEMES[idx].base;
  bgBlend = 0;
  targetTheme = idx;
  particles = BG_THEMES[idx].particles();
}

function drawFrame() {
  requestAnimationFrame(drawFrame);
  if (!W) return;

  bgBlend = Math.min(1, bgBlend + 0.016);
  const bg = lerpColor(oldBase, newBase, bgBlend);
  ctx2.fillStyle = bg;
  ctx2.fillRect(0, 0, W, H);

  const t = Date.now() / 1000;

  for (let i = particles.length-1; i >= 0; i--) {
    const p = particles[i];

    if (p.type === 'spark') {
      p.life -= p.decay;
      if (p.life <= 0) {
        // respawn
        Object.assign(p, {
          x: Math.random(), y: 0.85+Math.random()*0.2,
          life: 1, vx: (Math.random()-0.5)*0.3, vy: -0.18-Math.random()*0.22
        });
        continue;
      }
      ctx2.globalAlpha = p.a * p.life;
      ctx2.fillStyle = p.color;
      ctx2.beginPath();
      ctx2.arc(p.x*W, p.y*H, p.r*p.life, 0, Math.PI*2);
      ctx2.fill();
      p.x += p.vx * 0.016;
      p.y += p.vy * 0.016;
    } else if (p.type === 'orb') {
      const grad = ctx2.createRadialGradient(p.x*W, p.y*H, 0, p.x*W, p.y*H, p.r);
      grad.addColorStop(0, p.color + 'AA');
      grad.addColorStop(1, p.color + '00');
      ctx2.globalAlpha = p.a;
      ctx2.fillStyle = grad;
      ctx2.beginPath();
      ctx2.arc(p.x*W, p.y*H, p.r, 0, Math.PI*2);
      ctx2.fill();
      p.x += p.vx * 0.016;
      p.y += p.vy * 0.016;
      if (p.x < -0.1) p.x = 1.1;
      if (p.x > 1.1)  p.x = -0.1;
      if (p.y < -0.1) p.y = 1.1;
      if (p.y > 1.1)  p.y = -0.1;
    } else if (p.type === 'wave') {
      p.twinkle += 0.04;
      p.waveOffset += 0.016 * p.waveFreq;
      p.y += Math.sin(p.waveOffset) * p.waveAmp * 0.016;
      p.x += p.vx * 0.016;
      if (p.x > 1.08) p.x = -0.08;
      const alpha = p.a * (0.5 + 0.5*Math.sin(p.twinkle));
      ctx2.globalAlpha = alpha;
      ctx2.fillStyle = p.color;
      ctx2.beginPath();
      ctx2.arc(p.x*W, p.y*H, p.r, 0, Math.PI*2);
      ctx2.fill();
    } else if (p.type === 'fire') {
      p.life -= p.decay;
      p.wobble += 0.12;
      if (p.life <= 0) {
        Object.assign(p, {
          x: Math.random(), y: 0.65+Math.random()*0.4,
          life: 0.6+Math.random()*0.4,
          vx: (Math.random()-0.5)*0.22,
          vy: -(0.15+Math.random()*0.35),
          r: 2+Math.random()*5,
          color: ['#ef4444','#f97316','#fb923c','#fde68a'][Math.floor(Math.random()*4)]
        });
        continue;
      }
      const fireAlpha = p.a * p.life * (0.7+0.3*Math.sin(p.wobble));
      const fireR = p.r * p.life;
      const grad = ctx2.createRadialGradient(p.x*W, p.y*H, 0, p.x*W, p.y*H, fireR*2.5);
      grad.addColorStop(0, p.color + 'FF');
      grad.addColorStop(0.5, p.color + '88');
      grad.addColorStop(1, p.color + '00');
      ctx2.globalAlpha = fireAlpha;
      ctx2.fillStyle = grad;
      ctx2.beginPath();
      ctx2.arc(p.x*W, p.y*H, fireR*2.5, 0, Math.PI*2);
      ctx2.fill();
      p.x += (p.vx + Math.sin(p.wobble)*0.008) * 0.016;
      p.y += p.vy * 0.016;
    } else { // star
      p.twinkle += 0.04;
      const alpha = p.a * (0.6 + 0.4*Math.sin(p.twinkle));
      ctx2.globalAlpha = alpha;
      ctx2.fillStyle = p.color;
      ctx2.beginPath();
      ctx2.arc(p.x*W, p.y*H, p.r, 0, Math.PI*2);
      ctx2.fill();
      p.x += p.vx * 0.016;
      p.y += p.vy * 0.016;
      if (p.x < -0.05) p.x = 1.05;
      if (p.x > 1.05)  p.x = -0.05;
      if (p.y < -0.05) p.y = 1.05;
      if (p.y > 1.05)  p.y = -0.05;
    }
    ctx2.globalAlpha = 1;
  }
}

/* ═══════════════════════════════════
   COUNTER ANIMATION
═══════════════════════════════════ */
function animateCounter(el, target, duration=1200, suffix='') {
  const start = Date.now();
  const fmt = n => n.toLocaleString('tr-TR') + suffix;
  el.textContent = fmt(0);
  function tick() {
    const elapsed = Date.now() - start;
    const progress = Math.min(elapsed / duration, 1);
    const eased = 1 - Math.pow(1 - progress, 3);
    el.textContent = fmt(Math.round(eased * target));
    if (progress < 1) requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);
}

/* ═══════════════════════════════════
   SLIDE ENGINE
═══════════════════════════════════ */
let cur = 0, busy = false, autoTimer = null;
const stage = document.getElementById('stage');
let activeEl = null;

function mkSlide() {
  const el = document.createElement('div');
  el.className = 'slide';
  return el;
}

function showSlide(idx, dir) {
  if (busy) return;
  busy = true;
  clearTimeout(autoTimer);

  switchTheme(idx);

  const incoming = SLIDES[idx].build();
  stage.appendChild(incoming);

  const inClass  = dir >= 0 ? 'in-right' : 'in-left';
  const outClass = dir >= 0 ? 'out-left'  : 'out-right';

  if (activeEl) {
    const old = activeEl;
    old.classList.add(outClass);
    old.addEventListener('animationend', () => old.remove(), {once:true});
  }

  incoming.classList.add(inClass);
  incoming.addEventListener('animationend', () => {
    incoming.classList.remove(inClass);
    incoming.classList.add('visible');
    activeEl = incoming;
    busy = false;
    // Auto-advance (not on last slide)
    if (idx < SLIDES.length - 1) {
      autoTimer = setTimeout(() => { if (cur < SLIDES.length-1) { cur++; showSlide(cur,1); }}, 7000);
    }
  }, {once:true});

  updateProgress(idx);
}

/* ═══════════════════════════════════
   PROGRESS BARS
═══════════════════════════════════ */
const progWrap = document.getElementById('prog-wrap');
SLIDES.forEach((_,i) => {
  const s = document.createElement('div');
  s.className = 'seg';
  s.innerHTML = `<div class="seg-fill" id="sf-${i}"></div>`;
  progWrap.appendChild(s);
});

function updateProgress(idx) {
  SLIDES.forEach((_,i) => {
    const f = document.getElementById(`sf-${i}`);
    f.className = 'seg-fill';
    if (i < idx) {
      f.classList.add('instant');
    } else if (i === idx) {
      void f.offsetWidth;
      f.classList.add('timed');
    }
  });
}

/* ═══════════════════════════════════
   NAVIGATE
═══════════════════════════════════ */
function nav(dir) {
  const next = cur + dir;
  if (next < 0 || next >= SLIDES.length) return;
  cur = next;
  showSlide(cur, dir);
}

function restart() { cur = 0; showSlide(0, 1); }

/* ═══════════════════════════════════
   OUTRO: CONFETTI + SOUND
═══════════════════════════════════ */
function startRayCanvas() {
  const rc = document.getElementById('ray-canvas');
  if (!rc) return;
  const rctx = rc.getContext('2d');
  rc.width  = rc.offsetWidth;
  rc.height = rc.offsetHeight;
  const RW = rc.width, RH = rc.height;
  const cx = RW * 0.5, cy = RH * 0.32;
  const rays = Array.from({length: 18}, (_, i) => ({
    angle: (i / 18) * Math.PI * 2,
    speed: 0.0004 + Math.random() * 0.0003,
    width: 18 + Math.random() * 28,
    len:   RH * (0.7 + Math.random() * 0.5),
    a:     0.025 + Math.random() * 0.04,
  }));
  let rafId;
  function drawRays() {
    rctx.clearRect(0, 0, RW, RH);
    const t = Date.now();
    rays.forEach(r => {
      r.angle += r.speed;
      const x2 = cx + Math.cos(r.angle) * r.len;
      const y2 = cy + Math.sin(r.angle) * r.len;
      const grad = rctx.createLinearGradient(cx, cy, x2, y2);
      grad.addColorStop(0,   `rgba(255,229,102,${r.a * 2.5})`);
      grad.addColorStop(0.3, `rgba(255,229,102,${r.a})`);
      grad.addColorStop(1,   'rgba(255,229,102,0)');
      rctx.save();
      rctx.translate(cx, cy);
      rctx.rotate(r.angle);
      rctx.beginPath();
      rctx.moveTo(0, -r.width / 2);
      rctx.lineTo(r.len, 0);
      rctx.lineTo(0,  r.width / 2);
      rctx.closePath();
      rctx.fillStyle = grad;
      rctx.globalAlpha = 0.7;
      rctx.fill();
      rctx.restore();
    });
    rafId = requestAnimationFrame(drawRays);
  }
  drawRays();
  // cleanup when slide leaves
  setTimeout(() => cancelAnimationFrame(rafId), 15000);
}

function fireOutro() {
  const phone = document.getElementById('phone');
  const rect  = phone.getBoundingClientRect();
  const ox = (rect.left + rect.width/2)  / window.innerWidth;
  const oy = (rect.top  + rect.height*0.6) / window.innerHeight;

  // Wave 1 — centre burst
  confetti({ particleCount:140, spread:75, origin:{x:ox, y:oy},
    colors:['#FFE566','#f472b6','#a78bfa','#34d399'], scalar:1.1 });
  // Wave 2 — left cannon
  setTimeout(() => confetti({ particleCount:80, angle:60, spread:55,
    origin:{x: ox - 0.18, y: oy + 0.05},
    colors:['#fff','#FFE566','#f472b6'], scalar:0.9 }), 380);
  // Wave 3 — right cannon + upward shower
  setTimeout(() => {
    confetti({ particleCount:80, angle:120, spread:55,
      origin:{x: ox + 0.18, y: oy + 0.05},
      colors:['#a78bfa','#34d399','#FFE566'], scalar:0.9 });
    confetti({ particleCount:60, spread:100, startVelocity:20,
      origin:{x:ox, y:oy - 0.1},
      colors:['#fff','#FFE566'], ticks:180 });
  }, 760);

  if (navigator.vibrate) navigator.vibrate([100,60,200,60,100]);

  try {
    const ac = new (window.AudioContext||window.webkitAudioContext)();
    const master = ac.createGain();
    master.gain.value = 0.5;
    master.connect(ac.destination);

    // Reverb room sim
    const convolver = ac.createConvolver();
    const revLen = ac.sampleRate * 1.5;
    const revBuf = ac.createBuffer(2, revLen, ac.sampleRate);
    for (let ch = 0; ch < 2; ch++) {
      const d = revBuf.getChannelData(ch);
      for (let i = 0; i < revLen; i++) d[i] = (Math.random()*2-1) * Math.pow(1-i/revLen, 2.5);
    }
    convolver.buffer = revBuf;
    const revGain = ac.createGain();
    revGain.gain.value = 0.35;
    convolver.connect(revGain).connect(master);

    function playNote(freq, startTime, duration, type='sawtooth', vol=0.28) {
      const osc = ac.createOscillator();
      const g   = ac.createGain();
      osc.type = type;
      osc.frequency.value = freq;
      osc.detune.value = (Math.random()-0.5)*8;
      g.gain.setValueAtTime(0, startTime);
      g.gain.linearRampToValueAtTime(vol, startTime + 0.04);
      g.gain.setValueAtTime(vol, startTime + duration - 0.08);
      g.gain.linearRampToValueAtTime(0, startTime + duration);
      osc.connect(g);
      g.connect(master);
      g.connect(convolver);
      osc.start(startTime);
      osc.stop(startTime + duration + 0.1);
    }

    function playDrum(startTime) {
      const buf = ac.createBuffer(1, ac.sampleRate*0.5, ac.sampleRate);
      const d = buf.getChannelData(0);
      for (let i=0; i<d.length; i++) d[i] = (Math.random()*2-1) * Math.pow(1-i/d.length,3);
      const src = ac.createBufferSource();
      src.buffer = buf;
      const g = ac.createGain();
      g.gain.setValueAtTime(0.55, startTime);
      g.gain.linearRampToValueAtTime(0, startTime+0.35);
      const filt = ac.createBiquadFilter();
      filt.type = 'lowpass'; filt.frequency.value = 180;
      src.connect(filt).connect(g).connect(master);
      src.start(startTime); src.stop(startTime+0.5);
    }

    const now = ac.currentTime;

    // Timpani hits
    playDrum(now);
    playDrum(now + 0.55);
    playDrum(now + 1.1);

    // Fanfare melody — C major triumphant motif
    const phrase1 = [
      [523, now+0.0,  0.18],
      [523, now+0.18, 0.18],
      [523, now+0.36, 0.18],
      [659, now+0.54, 0.42],
    ];
    const phrase2 = [
      [523, now+1.1,  0.18],
      [659, now+1.28, 0.18],
      [784, now+1.46, 0.18],
      [1047,now+1.64, 0.65],
    ];

    [...phrase1, ...phrase2].forEach(([f,t,dur]) => {
      playNote(f, t, dur, 'sawtooth', 0.26);
      playNote(f/2, t+0.01, dur, 'sawtooth', 0.14);
      playNote(f, t+0.02, dur, 'square', 0.08);
    });

    // Harmony — 3rd above
    const harmony = [
      [659, now+0.0,  0.18],
      [659, now+0.18, 0.18],
      [659, now+0.36, 0.18],
      [830, now+0.54, 0.42],
      [659, now+1.1,  0.18],
      [830, now+1.28, 0.18],
      [988, now+1.46, 0.18],
      [1319,now+1.64, 0.65],
    ];
    harmony.forEach(([f,t,dur]) => playNote(f, t, dur, 'sawtooth', 0.13));

  } catch(e){}
}
